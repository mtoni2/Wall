<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wall Escolar - mtoni2</title>
    <script src="https://www.gstatic.com/firebasejs/9.1.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.1.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.1.1/firebase-firestore-compat.js"></script>
    <style>
        body { background: #eef2f3; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; margin: 0; padding: 0; }
        #login-screen { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #1a73e8; color: white; display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 1000; text-align: center; }
        #header { background: white; padding: 15px 20px; display: flex; justify-content: space-between; align-items: center; box-shadow: 0 2px 5px rgba(0,0,0,0.1); display: none; }
        #canvas { padding: 20px; display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 20px; }
        .note { background: #fff9c4; padding: 15px; border-radius: 10px; box-shadow: 3px 3px 10px rgba(0,0,0,0.1); border-left: 5px solid #fbc02d; position: relative; }
        .btn-add { background: #1a73e8; color: white; border: none; padding: 10px 20px; border-radius: 5px; cursor: pointer; font-weight: bold; }
        .btn-login { background: white; color: #1a73e8; border: none; padding: 15px 30px; border-radius: 30px; cursor: pointer; font-size: 1.1em; font-weight: bold; margin-top: 20px; }
    </style>
</head>
<body>

<div id="login-screen">
    <h1>📝 Wall Escolar mtoni2</h1>
    <p>Inicia sesión para ver y crear notas</p>
    <button class="btn-login" onclick="login()">Entrar con Google</button>
</div>

<div id="header">
    <span id="user-name" style="font-weight: bold; color: #333;"></span>
    <button class="btn-add" onclick="addNewNote()">+ Nueva Nota</button>
</div>

<div id="canvas"></div>

<script>
  // Tu configuración de Firebase
  const firebaseConfig = {
    apiKey: "AIzaSyCpGmt5Va1MQVtKZtd9_p1_TA-62L1rUOc",
    authDomain: "wall-5b79c.firebaseapp.com",
    projectId: "wall-5b79c",
    storageBucket: "wall-5b79c.firebasestorage.app",
    messagingSenderId: "167646035095",
    appId: "1:167646035095:web:8286c655f6b0986b33fdd2"
  };

  firebase.initializeApp(firebaseConfig);
  const auth = firebase.auth();
  const db = firebase.firestore();

  function login() {
    const provider = new firebase.auth.GoogleAuthProvider();
    auth.signInWithPopup(provider).then(result => {
        document.getElementById('login-screen').style.display = 'none';
        document.getElementById('header').style.display = 'flex';
        document.getElementById('user-name').innerText = "Hola, " + result.user.displayName;
        listenNotes();
    }).catch(error => {
        alert("Error al entrar: " + error.message);
    });
  }

  function addNewNote() {
    const text = prompt("¿Qué quieres escribir en el muro?");
    if (text) {
        db.collection("notes").add({
            content: text,
            author: auth.currentUser.displayName,
            date: new Date()
        });
    }
  }

  function listenNotes() {
    db.collection("notes").orderBy("date", "desc").onSnapshot(snapshot => {
        const canvas = document.getElementById('canvas');
        canvas.innerHTML = "";
        snapshot.forEach(doc => {
            const data = doc.data();
            const noteDiv = document.createElement('div');
            noteDiv.className = 'note';
            noteDiv.innerHTML = `<strong>${data.author}:</strong><br><p>${data.content}</p>`;
            canvas.appendChild(noteDiv);
        });
    });
  }
</script>
</body>
</html>
