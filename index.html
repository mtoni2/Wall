<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Muro Escolar - Ideas en Acción</title>
    <script src="https://www.gstatic.com/firebasejs/9.1.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.1.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.1.1/firebase-firestore-compat.js"></script>
    <style>
        :root {
            --primary: #0984e3;
            --success: #00b894;
            --danger: #d63031;
        }
        body { 
            margin: 0; 
            font-family: 'Segoe UI', sans-serif; 
            background: #d2b48c url('https://www.transparenttextures.com/patterns/cork-board.png'); 
            min-height: 100vh;
        }
        
        /* Pantallas de estado */
        #loading-screen { position: fixed; top:0; left:0; width:100%; height:100%; background: white; display: flex; justify-content: center; align-items: center; z-index: 3000; }
        #login-screen { 
            position: fixed; top:0; left:0; width:100%; height:100%; 
            background: linear-gradient(135deg, #6c5ce7, #a29bfe); 
            display:none; flex-direction:column; justify-content:center; align-items:center; z-index:2000; 
        }

        .login-card { background: white; padding: 40px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.3); text-align: center; width: 320px; }
        
        #header { 
            background: rgba(255, 255, 255, 0.95); backdrop-filter: blur(10px);
            padding: 15px 30px; display: none; justify-content: space-between; align-items:center; 
            box-shadow: 0 4px 15px rgba(0,0,0,0.1); position: sticky; top: 0; z-index: 1000; 
        }

        /* Contenedor de notas estilo Padlet */
        #canvas { 
            padding: 30px; 
            display: grid; 
            grid-template-columns: repeat(auto-fill, minmax(260px, 1fr)); 
            gap: 25px; 
        }

        /* Estilo de Nota Individual */
        .note { 
            padding: 25px; 
            border-radius: 3px; 
            box-shadow: 8px 8px 15px rgba(0,0,0,0.2); 
            position: relative; 
            min-height: 160px;
            display: flex;
            flex-direction: column;
            transition: transform 0.2s ease-in-out;
        }
        .note:hover { transform: scale(1.02); z-index: 10; }

        /* El Pin o Chinche */
        .note::before { 
            content: ""; position: absolute; top: -12px; left: 50%; transform: translateX(-50%);
            width: 18px; height: 18px; background: #e74c3c; border-radius: 50%; 
            box-shadow: 2px 2px 4px rgba(0,0,0,0.4); z-index: 2;
        }

        .note h3 { margin: 0 0 10px 0; font-size: 0.9em; text-transform: uppercase; color: rgba(0,0,0,0.6); border-bottom: 1px solid rgba(0,0,0,0.1); padding-bottom: 5px; }
        .note p { margin: 0; font-size: 1.1em; line-height: 1.4; color: #2d3436; word-wrap: break-word; }

        /* Botones de acción con la X */
        .actions { position: absolute; top: 8px; right: 10px; display: flex; gap: 10px; }
        .action-btn { 
            background: none; border: none; cursor: pointer; 
            font-size: 1.2em; font-weight: bold; color: rgba(0,0,0,0.25); 
            transition: color 0.2s; padding: 0;
        }
        .action-btn:hover { color: #000; }
        .btn-delete:hover { color: var(--danger); }

        /* UI de Botones */
        .btn-add { background: var(--success); color: white; border: none; padding: 12px 24px; border-radius: 8px; cursor: pointer; font-weight: bold; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        .btn-add:hover { background: #00a082; }
        .btn-login { background: var(--primary); color: white; border: none; padding: 15px 35px; border-radius: 30px; cursor: pointer; font-weight: bold; width: 100%; font-size: 1em; }
    </style>
</head>
<body>

<div id="loading-screen"><h3>Iniciando sistema...</h3></div>

<div id="login-screen">
    <div class="login-card">
        <h1 style="color:var(--primary); margin-bottom:10px">Wall Escolar</h1>
        <p style="color:gray; margin-bottom:30px">Colaborá en tiempo real</p>
        <button class="btn-login" onclick="login()">Entrar con Google</button>
    </div>
</div>

<div id="header">
    <div style="display:flex; align-items:center; gap:10px">
        <span style="font-size:1.5em">📌</span>
        <h2 style="margin:0; font-size:1.2em; color:#2d3436">Muro: Ideas en Acción</h2>
    </div>
    <div style="display:flex; align-items:center; gap:20px">
        <div style="text-align:right">
            <div id="user-name" style="font-weight: bold; font-size:0.9em"></div>
            <button onclick="logout()" style="background:none; border:none; color:var(--danger); cursor:pointer; font-size:0.75em; padding:0">Cerrar Sesión</button>
        </div>
        <button class="btn-add" onclick="addNewNote()">+ Nueva Nota</button>
    </div>
</div>

<div id="canvas"></div>

<script>
  // Configuración de tu proyecto "wall-5b79c"
  const firebaseConfig = {
    apiKey: "AIzaSyCpGmt5Va1MQVtKZtd9_p1_TA-62L1rUOc",
    authDomain: "wall-5b79c.firebaseapp.com",
    projectId: "wall-5b79c",
    storageBucket: "wall-5b79c.firebasestorage.app",
    messagingSenderId: "167646035095",
    appId: "1:167646035095:web:8286c655f6b0986b33fdd2"
  };

  firebase.initializeApp(firebaseConfig);
  const auth = firebase.auth();
  const db = firebase.firestore();

  // Colores vibrantes tipo Post-it
  const colors = ['#fff740', '#7efff5', '#ffaf40', '#cd84f1', '#ffcccc', '#67e6dc'];

  // Control de autenticación
  auth.onAuthStateChanged(user => {
    document.getElementById('loading-screen').style.display = 'none';
    if (user) {
        document.getElementById('login-screen').style.display = 'none';
        document.getElementById('header').style.display = 'flex';
        document.getElementById('user-name').innerText = user.displayName;
        listenNotes();
    } else {
        document.getElementById('login-screen').style.display = 'flex';
        document.getElementById('header').style.display = 'none';
        document.getElementById('canvas').innerHTML = "";
    }
  });

  function login() { auth.signInWithPopup(new firebase.auth.GoogleAuthProvider()); }
  function logout() { if(confirm("¿Seguro que querés salir?")) auth.signOut(); }

  function addNewNote() {
    const text = prompt("Escribí tu mensaje para el muro:");
    if (text && text.trim() !== "") {
        db.collection("notes").add({
            content: text,
            author: auth.currentUser.displayName,
            authorId: auth.currentUser.uid,
            color: colors[Math.floor(Math.random() * colors.length)],
            rotation: (Math.random() * 6 - 3).toFixed(1), // Rotación leve para realismo
            date: firebase.firestore.FieldValue.serverTimestamp()
        });
    }
  }

  // Funciones de Gestión con la X aplicada
  function deleteNote(id) { 
    if(confirm("¿Eliminar esta nota definitivamente?")) {
        db.collection("notes").doc(id).delete();
    }
  }
  
  function editNote(id, oldText) {
    const newText = prompt("Editar contenido:", oldText);
    if (newText && newText.trim() !== "" && newText !== oldText) {
        db.collection("notes").doc(id).update({ content: newText });
    }
  }

  function listenNotes() {
    db.collection("notes").orderBy("date", "desc").onSnapshot(snapshot => {
        const canvas = document.getElementById('canvas');
        canvas.innerHTML = "";
        snapshot.forEach(doc => {
            const data = doc.data();
            const isOwner = data.authorId === auth.currentUser.uid;
            const noteDiv = document.createElement('div');
            noteDiv.className = 'note';
            noteDiv.style.backgroundColor = data.color || '#fff9c4';
            noteDiv.style.transform = `rotate(${data.rotation || 0}deg)`;
            
            noteDiv.innerHTML = `
                <div class="actions">
                    ${isOwner ? `<button class="action-btn" onclick="editNote('${doc.id}', '${data.content.replace(/'/g, "\\'")}')" title="Editar">✏️</button>` : ''}
                    ${isOwner ? `<button class="action-btn btn-delete" onclick="deleteNote('${doc.id}')" title="Eliminar">X</button>` : ''}
                </div>
                <h3>${data.author}</h3>
                <p>${data.content}</p>
            `;
            canvas.appendChild(noteDiv);
        });
    });
  }
</script>
</body>
</html>
