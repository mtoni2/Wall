<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>📌 Muro de Ideas Pro - Wall Escolar</title>
  <style>
    :root {
      --primary: #4f46e5; --primary-hover: #4338ca;
      --bg: #f8fafc; --card-bg: #ffffff; --text: #0f172a;
      --text-muted: #64748b; --border: #e2e8f0;
      --success: #22c55e; --danger: #ef4444;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Segoe UI', system-ui, sans-serif;
      background: var(--bg); color: var(--text);
      line-height: 1.5; min-height: 100vh;
    }

    /* === LANDING PAGE === */
    .landing {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 2rem;
      text-align: center;
      background: linear-gradient(135deg, rgba(102, 126, 234, 0.15) 0%, rgba(118, 75, 162, 0.15) 100%), 
                  url('data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 800"><rect fill="%23f8fafc" width="1200" height="800"/><image href="https://images.unsplash.com/photo-1522071820081-009f0129c71c?w=1200&h=800&fit=crop" opacity="0.15" width="1200" height="800"/></svg>');
      background-size: cover;
      background-position: center;
      background-blend-mode: overlay;
      color: var(--text);
      position: relative;
    }
    .landing::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0; bottom: 0;
      background: rgba(102, 126, 234, 0.08);
      pointer-events: none;
    }
    .landing > * { position: relative; z-index: 1; }
    .landing.hidden { display: none !important; }
    
    .landing-logo {
      font-size: 2.5rem;
      font-weight: 800;
      margin-bottom: 0.5rem;
      display: flex;
      align-items: center;
      gap: 0.5rem;
      justify-content: center;
      color: var(--text);
    }
    .landing-subtitle {
      font-size: 1.2rem;
      color: var(--text-muted);
      margin-bottom: 1rem;
      font-weight: 400;
    }
    .landing-description {
      font-size: 1.1rem;
      color: var(--text-muted);
      max-width: 500px;
      margin: 0 auto 2rem;
      line-height: 1.6;
    }
    
    .google-btn {
      display: inline-flex;
      align-items: center;
      gap: 0.6rem;
      background: white;
      color: #333;
      border: none;
      padding: 0.9rem 2rem;
      border-radius: 12px;
      font-weight: 600;
      font-size: 1rem;
      cursor: pointer;
      box-shadow: 0 4px 20px rgba(0,0,0,0.15);
      transition: transform 0.15s, box-shadow 0.15s;
    }
    .google-btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 30px rgba(0,0,0,0.2);
    }
    .google-btn img { width: 24px; height: 24px; }
    
    .welcome-msg {
      margin-top: 1.5rem;
      font-size: 1rem;
      color: var(--primary);
      font-weight: 500;
    }

    .landing-footer {
      position: absolute;
      bottom: 1.5rem;
      left: 0;
      right: 0;
      text-align: center;
      font-size: 0.85rem;
      color: var(--text-muted);
      z-index: 1;
    }

    /* === APP UI (post-login) === */
    .app-ui { display: none; }
    .app-ui.visible { display: block; }
    
    header {
      background: white;
      color: var(--text);
      padding: 0.8rem 1.5rem;
      display: flex;
      justify-content: space-between;
      align-items: center;
      position: sticky;
      top: 0;
      z-index: 100;
      border-bottom: 1px solid var(--border);
      box-shadow: 0 1px 4px rgba(0,0,0,0.05);
    }
    .header-title {
      font-size: 1.2rem;
      font-weight: 700;
      display: flex;
      align-items: center;
      gap: 0.4rem;
    }
    .user-section { display: flex; align-items: center; gap: 1rem; }
    .user-info { text-align: right; }
    .user-name { font-weight: 600; font-size: 0.9rem; }
    .user-email { font-size: 0.75rem; color: var(--text-muted); }
    .avatar {
      width: 36px; height: 36px; border-radius: 50%;
      background: var(--primary); color: white;
      display: flex; align-items: center; justify-content: center;
      font-weight: 700; font-size: 0.9rem;
    }
    
    .toolbar {
      padding: 0.8rem 1.5rem;
      background: white;
      border-bottom: 1px solid var(--border);
      display: flex;
      gap: 0.5rem;
      flex-wrap: wrap;
      position: sticky;
      top: 57px;
      z-index: 99;
    }
    .btn {
      padding: 0.5rem 1rem;
      border: none;
      border-radius: 8px;
      background: var(--primary);
      color: white;
      cursor: pointer;
      font-weight: 500;
      font-size: 0.9rem;
      display: inline-flex;
      align-items: center;
      gap: 0.3rem;
      transition: background 0.2s;
    }
    .btn:hover { background: var(--primary-hover); }
    .btn-outline {
      background: transparent;
      border: 1px solid var(--border);
      color: var(--text);
    }
    .btn-outline:hover { background: #f8fafc; }
    .btn-sm { padding: 0.3rem 0.6rem; font-size: 0.8rem; }
    .btn-danger { background: var(--danger); }
    .btn-danger:hover { background: #dc2626; }
    
    .search-box {
      margin-left: auto;
      display: flex;
      align-items: center;
      background: #f8fafc;
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 0.3rem 0.8rem;
    }
    .search-box input {
      border: none;
      background: transparent;
      padding: 0.3rem;
      font-size: 0.9rem;
      width: 180px;
      outline: none;
    }
    .layout-selector { display: flex; gap: 0.2rem; }
    .layout-btn {
      width: 34px; height: 34px;
      border: 1px solid var(--border);
      border-radius: 6px;
      background: white;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1rem;
      transition: all 0.2s;
    }
    .layout-btn.active {
      border-color: var(--primary);
      background: #eef2ff;
      color: var(--primary);
    }
    
    #board {
      padding: 1.2rem 1.5rem;
      min-height: calc(100vh - 140px);
    }
    .board-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
      gap: 1rem;
    }
    .board-canvas {
      position: relative;
      min-height: 600px;
      background-image: radial-gradient(#cbd5e1 1px, transparent 1px);
      background-size: 24px 24px;
    }
    .board-list {
      display: flex;
      flex-direction: column;
      gap: 0.8rem;
    }
    
    .note {
      background: var(--card-bg);
      border-radius: 12px;
      padding: 1rem;
      box-shadow: 0 2px 8px rgba(0,0,0,0.06);
      border: 1px solid var(--border);
      transition: transform 0.15s;
      position: relative;
      overflow: hidden; /* Previene que nada se salga */
    }
    .note:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 24px rgba(0,0,0,0.1);
    }
    .note-header {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      margin-bottom: 0.7rem;
      padding-bottom: 0.6rem;
      border-bottom: 1px solid var(--border);
    }
    .note-author {
      display: flex;
      align-items: center;
      gap: 0.4rem;
      font-size: 0.85rem;
      font-weight: 500;
    }
    .note-author .avatar {
      width: 24px; height: 24px;
      font-size: 0.75rem;
    }
    .note-date {
      font-size: 0.75rem;
      color: var(--text-muted);
    }
    .note-actions { display: flex; gap: 0.2rem; }
    .note-actions button {
      background: none;
      border: none;
      cursor: pointer;
      font-size: 1rem;
      opacity: 0.7;
      padding: 0.2rem;
      border-radius: 4px;
      transition: opacity 0.2s, background 0.2s;
    }
    .note-actions button:hover {
      opacity: 1;
      background: #f1f5f9;
    }
    .note-title {
      font-weight: 600;
      margin-bottom: 0.4rem;
      font-size: 1.05rem;
    }
    .note-content {
      margin-bottom: 0.7rem;
      color: #334155;
      white-space: pre-wrap;
    }
    .note-content img,
    .note-content video {
      max-width: 100%;
      max-height: 250px; /* Limita altura máxima */
      width: auto;
      height: auto;
      object-fit: contain; /* Mantiene proporción */
      border-radius: 8px;
      margin-top: 0.4rem;
      display: block;
    }
    .note-content iframe {
      max-width: 100%;
      border-radius: 8px;
      margin-top: 0.4rem;
    }
    .note-content a.link-card {
      display: block;
      padding: 0.7rem;
      background: #f8fafc;
      border-radius: 8px;
      text-decoration: none;
      color: var(--primary);
      margin-top: 0.4rem;
      border: 1px solid var(--border);
      word-break: break-all;
    }
    .note-content a.link-card:hover { background: #f1f5f9; }
    .note-tags {
      display: flex;
      flex-wrap: wrap;
      gap: 0.3rem;
      margin-bottom: 0.7rem;
    }
    .tag {
      font-size: 0.7rem;
      padding: 0.2rem 0.5rem;
      background: #eef2ff;
      color: var(--primary);
      border-radius: 20px;
      font-weight: 500;
      cursor: pointer;
    }
    .tag:hover { background: #dbeafe; }
    .note-reactions {
      display: flex;
      gap: 0.8rem;
      font-size: 0.85rem;
      color: var(--text-muted);
      border-top: 1px solid var(--border);
      padding-top: 0.6rem;
    }
    .reaction-btn {
      display: flex;
      align-items: center;
      gap: 0.2rem;
      background: none;
      border: none;
      cursor: pointer;
      padding: 0.2rem 0.4rem;
      border-radius: 4px;
      transition: background 0.2s;
    }
    .reaction-btn:hover { background: #f1f5f9; }
    
    .modal {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.5);
      z-index: 200;
      align-items: center;
      justify-content: center;
      padding: 1rem;
    }
    .modal.active { display: flex; }
    .modal-content {
      background: white;
      border-radius: 16px;
      width: 100%;
      max-width: 520px;
      max-height: 92vh;
      overflow-y: auto;
      box-shadow: 0 20px 60px rgba(0,0,0,0.25);
    }
    .modal-header {
      padding: 1.1rem 1.4rem;
      border-bottom: 1px solid var(--border);
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .modal-header h3 { font-size: 1.2rem; }
    .modal-body { padding: 1.3rem 1.4rem; }
    .modal-footer {
      padding: 0.9rem 1.4rem;
      border-top: 1px solid var(--border);
      display: flex;
      justify-content: flex-end;
      gap: 0.5rem;
    }
    .form-group { margin-bottom: 1rem; }
    .form-group label {
      display: block;
      margin-bottom: 0.4rem;
      font-weight: 500;
      font-size: 0.9rem;
    }
    .form-group input,
    .form-group textarea {
      width: 100%;
      padding: 0.7rem 0.9rem;
      border: 1px solid var(--border);
      border-radius: 8px;
      font-size: 0.95rem;
      transition: border-color 0.2s;
    }
    .form-group input:focus,
    .form-group textarea:focus {
      outline: none;
      border-color: var(--primary);
    }
    .form-group textarea {
      min-height: 90px;
      resize: vertical;
    }
    .form-hint {
      font-size: 0.75rem;
      color: var(--text-muted);
      margin-top: 0.3rem;
    }
    
    .post-types {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 0.4rem;
    }
    .post-type-btn {
      padding: 0.7rem 0.4rem;
      border: 1px solid var(--border);
      border-radius: 10px;
      background: white;
      cursor: pointer;
      text-align: center;
      transition: all 0.2s;
      font-size: 0.8rem;
    }
    .post-type-btn:hover,
    .post-type-btn.active {
      border-color: var(--primary);
      background: #eef2ff;
      color: var(--primary);
    }
    .post-type-btn .icon {
      font-size: 1.2rem;
      display: block;
      margin-bottom: 0.2rem;
    }
    
    .color-picker {
      display: flex;
      gap: 0.4rem;
      flex-wrap: wrap;
    }
    .color-option {
      width: 30px;
      height: 30px;
      border-radius: 50%;
      border: 2px solid transparent;
      cursor: pointer;
      transition: transform 0.15s;
    }
    .color-option:hover { transform: scale(1.15); }
    .color-option.selected {
      border-color: var(--text);
      box-shadow: 0 0 0 2px white;
    }
    
    .empty-state {
      text-align: center;
      padding: 3rem 1rem;
      color: var(--text-muted);
    }
    .empty-state .icon {
      font-size: 3rem;
      margin-bottom: 1rem;
      display: block;
    }
    
    .toast {
      position: fixed;
      bottom: 1.5rem;
      right: 1.5rem;
      background: #1e293b;
      color: white;
      padding: 0.8rem 1.2rem;
      border-radius: 10px;
      box-shadow: 0 8px 24px rgba(0,0,0,0.2);
      z-index: 300;
      animation: slideIn 0.3s ease;
    }
    @keyframes slideIn {
      from { transform: translateX(100px); opacity: 0; }
      to { transform: translateX(0); opacity: 1; }
    }
    
    .loading {
      text-align: center;
      padding: 2rem;
      color: var(--text-muted);
    }
    .loading::after {
      content: "⋯";
      animation: dots 1.5s steps(4, end) infinite;
    }
    @keyframes dots {
      0%, 20% { content: "."; }
      40% { content: ".."; }
      60%, 100% { content: "..."; }
    }
    
    @media (max-width: 640px) {
      .landing-logo { font-size: 2rem; }
      .landing-description { font-size: 1rem; }
      header, .toolbar { padding: 0.8rem 1rem; }
      .search-box { width: 100%; margin-left: 0; margin-top: 0.4rem; }
      .search-box input { width: 100%; }
      .post-types { grid-template-columns: repeat(2, 1fr); }
      #board { padding: 0.8rem 1rem; }
    }
  </style>
</head>
<body>

  <!-- === LANDING PAGE (antes de login) === -->
  <main class="landing" id="landingPage">
    <div class="landing-logo">📌 Muro de Ideas Pro</div>
    <div class="landing-subtitle">Wall Escolar</div>
    <p class="landing-description">Tu espacio profesional de ideas.</p>
    
    <button class="google-btn" id="googleLogin">
      <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" alt="G">
      Entrar con Google
    </button>
    
    <p class="welcome-msg" id="welcomeMsg" style="display:none;">¡Bienvenido!</p>
    
    <footer class="landing-footer">
      © 2026 - Desarrollado por Marcelo Tonini
    </footer>
  </main>

  <!-- === APP UI (después de login) === -->
  <div class="app-ui" id="appUI">
    
    <!-- Header -->
    <header>
      <div class="header-title">📌 Muro de Ideas</div>
      <div class="user-section">
        <div class="user-info">
          <div class="user-name" id="userName"></div>
          <div class="user-email" id="userEmail"></div>
        </div>
        <div class="avatar" id="userAvatar">U</div>
        <button class="btn btn-outline btn-sm" id="btnLogout">SALIR</button>
      </div>
    </header>

    <!-- Toolbar (con botón de crear nota) -->
    <div class="toolbar">
      <button class="btn" id="btnNewNote">+ NOTA</button>
      <div style="margin-left:auto;display:flex;gap:0.5rem;align-items:center">
        <div class="search-box">
          <input type="search" id="searchInput" placeholder="Buscar...">
        </div>
        <div class="layout-selector">
          <button class="layout-btn active" data-layout="grid" title="Cuadrícula">▦</button>
          <button class="layout-btn" data-layout="canvas" title="Lienzo">✏️</button>
          <button class="layout-btn" data-layout="list" title="Lista">☰</button>
        </div>
        <button class="btn btn-outline" id="btnExport" title="Exportar">📤</button>
      </div>
    </div>

    <!-- Board -->
    <main id="board" class="board-grid">
      <div class="empty-state" id="emptyState">
        <span class="icon">✨</span>
        <p><strong>¡Tu muro está vacío!</strong></p>
        <button class="btn" id="btnNewNoteEmpty">+ Crear primera nota</button>
      </div>
    </main>

  </div>

  <!-- Modal: Nueva/Editar Nota -->
  <div class="modal" id="noteModal">
    <div class="modal-content">
      <div class="modal-header">
        <h3 id="modalTitle">✨ Nueva Nota</h3>
        <button class="btn btn-outline btn-sm" id="closeModal">✕</button>
      </div>
      <div class="modal-body">
        <div class="form-group">
          <label>Tipo de contenido</label>
          <div class="post-types">
            <button class="post-type-btn active" data-type="text"><span class="icon">📝</span>Texto</button>
            <button class="post-type-btn" data-type="image"><span class="icon">🖼️</span>Imagen</button>
            <button class="post-type-btn" data-type="video"><span class="icon">🎬</span>Video</button>
            <button class="post-type-btn" data-type="link"><span class="icon">🔗</span>Enlace</button>
          </div>
        </div>
        <div class="form-group">
          <label for="noteTitle">Título *</label>
          <input type="text" id="noteTitle" placeholder="Ej: Idea para el proyecto">
        </div>
        <div class="form-group" id="fieldContent">
          <label for="noteBody">Contenido</label>
          <textarea id="noteBody" placeholder="Escribe tu idea..."></textarea>
        </div>
        <div class="form-group" id="fieldUrl" style="display:none;">
          <label for="noteUrl" id="urlLabel">URL</label>
          <input type="url" id="noteUrl" placeholder="https://ejemplo.com/imagen.jpg">
          <div class="form-hint" id="urlHint">Pega un enlace directo</div>
        </div>
        <div class="form-group">
          <label>Color de nota:</label>
          <div class="color-picker">
            <div class="color-option selected" style="background:#fff" data-color="#ffffff"></div>
            <div class="color-option" style="background:#fef3c7" data-color="#fef3c7"></div>
            <div class="color-option" style="background:#dbeafe" data-color="#dbeafe"></div>
            <div class="color-option" style="background:#dcfce7" data-color="#dcfce7"></div>
            <div class="color-option" style="background:#fce7f3" data-color="#fce7f3"></div>
            <div class="color-option" style="background:#f3e8ff" data-color="#f3e8ff"></div>
          </div>
        </div>
        <div class="form-group">
          <label for="noteTags">Etiquetas</label>
          <input type="text" id="noteTags" placeholder="matemáticas, equipo, urgente">
          <div class="form-hint">Separa con comas</div>
        </div>
        <div class="form-group">
          <label><input type="checkbox" id="notePrivate"> 🔒 Nota privada (solo yo)</label>
        </div>
      </div>
      <div class="modal-footer">
        <button class="btn btn-outline" id="cancelNote">Cancelar</button>
        <button class="btn" id="saveNote">GUARDAR CAMBIOS</button>
      </div>
    </div>
  </div>

  <div id="toastContainer"></div>

  <!-- Firebase SDK + App Logic -->
  <script type="module">
    // ✅ Firebase SDK v10 (estable)
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.14.0/firebase-app.js";
    import { getAuth, GoogleAuthProvider, signInWithPopup, signOut, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.14.0/firebase-auth.js";
    import { getFirestore, collection, addDoc, updateDoc, deleteDoc, doc, onSnapshot, query, orderBy, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.14.0/firebase-firestore.js";

    // 🔥 TU CONFIGURACIÓN DE FIREBASE
    const firebaseConfig = {
      apiKey: "AIzaSyCpGmt5Va1MQVtKZtd9_p1_TA-62L1rUOc",
      authDomain: "wall-5b79c.firebaseapp.com",
      projectId: "wall-5b79c",
      storageBucket: "wall-5b79c.firebasestorage.app",
      messagingSenderId: "167646035095",
      appId: "1:167646035095:web:8286c655f6b0986b33fdd2",
      measurementId: "G-PKW4S5Q177"
    };

    // Inicializar Firebase
    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);
    const provider = new GoogleAuthProvider();

    // Estado
    const state = {
      currentUser: null,
      boardId: 'default_board',
      notes: [],
      unsubscribe: null,
      currentLayout: 'grid',
      selectedColor: '#ffffff',
      editingNoteId: null
    };

    // DOM Elements
    const els = {
      landingPage: document.getElementById('landingPage'),
      appUI: document.getElementById('appUI'),
      welcomeMsg: document.getElementById('welcomeMsg'),
      board: document.getElementById('board'),
      emptyState: document.getElementById('emptyState'),
      noteModal: document.getElementById('noteModal'),
      searchInput: document.getElementById('searchInput'),
      toastContainer: document.getElementById('toastContainer')
    };

    // === AUTH STATE ===
    onAuthStateChanged(auth, (user) => {
      if (user) {
        // Usuario logueado: mostrar app
        state.currentUser = user;
        document.getElementById('userName').textContent = user.displayName || 'Usuario';
        document.getElementById('userEmail').textContent = user.email;
        document.getElementById('userAvatar').textContent = (user.displayName?.[0] || 'U').toUpperCase();
        
        els.landingPage.classList.add('hidden');
        els.appUI.classList.add('visible');
        
        subscribeToNotes();
      } else {
        // Usuario no logueado: mostrar landing
        state.currentUser = null;
        if (state.unsubscribe) state.unsubscribe();
        
        els.landingPage.classList.remove('hidden');
        els.appUI.classList.remove('visible');
      }
    });

    // Login con Google
    document.getElementById('googleLogin').onclick = async () => {
      try {
        await signInWithPopup(auth, provider);
        showToast('✅ ¡Bienvenido!');
        els.welcomeMsg.style.display = 'block';
        setTimeout(() => els.welcomeMsg.style.display = 'none', 2000);
      } catch (error) {
        console.error('Error login:', error);
        showToast('❌ Error: ' + (error.message || 'Revisa la consola'));
      }
    };

    // Logout
    document.getElementById('btnLogout').onclick = async () => {
      await signOut(auth);
      showToast('👋 Sesión cerrada');
    };

    // === FIRESTORE: Suscribirse a notas ===
    function subscribeToNotes() {
      if (state.unsubscribe) state.unsubscribe();
      
      els.board.innerHTML = '<div class="loading">Cargando notas</div>';
      
      const q = query(
        collection(db, 'boards', state.boardId, 'notes'),
        orderBy('createdAt', 'desc')
      );
      
      state.unsubscribe = onSnapshot(q, 
        (snapshot) => {
          state.notes = snapshot.docs.map(d => ({ id: d.id, ...d.data() }));
          renderNotes();
        },
        (error) => {
          console.error('Error Firestore:', error);
          if (error.code === 'permission-denied') {
            showToast('⚠️ Revisa las reglas de Firestore');
          }
          els.board.innerHTML = '';
          els.board.appendChild(els.emptyState);
        }
      );
    }

    // === OPERACIONES FIRESTORE ===
    async function saveNoteToFirestore(noteData) {
      const notesRef = collection(db, 'boards', state.boardId, 'notes');
      
      if (state.editingNoteId) {
        await updateDoc(doc(notesRef, state.editingNoteId), {
          ...noteData, updatedAt: serverTimestamp()
        });
        showToast('✅ Nota actualizada');
      } else {
        await addDoc(notesRef, {
          ...noteData,
          authorId: state.currentUser.uid,
          author: state.currentUser.displayName || 'Usuario',
          createdAt: serverTimestamp(),
          updatedAt: serverTimestamp(),
          reactions: { likes: 0, comments: 0 }
        });
        showToast('✅ Nota creada');
      }
    }

    async function deleteNoteFromFirestore(noteId) {
      await deleteDoc(doc(db, 'boards', state.boardId, 'notes', noteId));
      showToast('🗑️ Nota eliminada');
    }

    async function updateReaction(noteId, field) {
      const noteRef = doc(db, 'boards', state.boardId, 'notes', noteId);
      const note = state.notes.find(n => n.id === noteId);
      if (note) {
        await updateDoc(noteRef, {
          [`reactions.${field}`]: (note.reactions?.[field] || 0) + 1
        });
      }
    }

    // === RENDER ===
    function renderNotes() {
      const filter = els.searchInput.value.toLowerCase();
      const visible = state.notes.filter(note => {
        if (note.private && note.authorId !== state.currentUser?.uid) return false;
        if (filter) {
          return note.title?.toLowerCase().includes(filter) ||
                 note.content?.toLowerCase().includes(filter) ||
                 note.tags?.some(t => t?.toLowerCase().includes(filter));
        }
        return true;
      });

      if (visible.length === 0) {
        els.board.innerHTML = '';
        els.board.appendChild(els.emptyState);
        els.emptyState.style.display = 'block';
        return;
      }
      
      els.emptyState.style.display = 'none';
      els.board.className = `board-${state.currentLayout}`;
      els.board.innerHTML = visible.map(note => createNoteHTML(note)).join('');
      
      if (state.currentLayout === 'canvas') setupCanvasDrag();
    }

    function createNoteHTML(note) {
      const isOwner = note.authorId === state.currentUser?.uid;
      const date = note.createdAt?.toDate?.() || new Date();
      const dateStr = date.toLocaleDateString('es-ES', { day:'numeric', month:'short', hour:'2-digit', minute:'2-digit' });
      
      let media = '';
      if (note.type === 'image' && note.url) {
        media = `<img src="${escapeHtml(note.url)}" alt="${escapeHtml(note.title)}" loading="lazy" onerror="this.parentElement.innerHTML='<p style=\\'color:var(--danger)\\'>❌ Imagen no cargada</p>'">`;
      } else if (note.type === 'video' && note.url) {
        if (note.url.includes('youtube.com') || note.url.includes('youtu.be')) {
          const vid = note.url.match(/(?:v=|\/)([a-zA-Z0-9_-]{11})/)?.[1];
          if (vid) media = `<iframe src="https://www.youtube.com/embed/${vid}" frameborder="0" allowfullscreen style="width:100%;aspect-ratio:16/9;border-radius:8px;margin-top:0.4rem"></iframe>`;
        } else if (note.url.match(/\.(mp4|webm|ogg)$/i)) {
          media = `<video controls src="${escapeHtml(note.url)}" style="width:100%;border-radius:8px;margin-top:0.4rem"></video>`;
        } else {
          media = `<a href="${escapeHtml(note.url)}" target="_blank" class="link-card">🎬 Ver video externo</a>`;
        }
      } else if (note.type === 'link' && note.url) {
        media = `<a href="${escapeHtml(note.url)}" target="_blank" class="link-card">🔗 ${escapeHtml(note.url.replace(/^https?:\/\//,''))}</a>`;
      }
      
      const tags = note.tags?.map(t => `<span class="tag" onclick="filterByTag('${escapeHtml(t)}')">#${escapeHtml(t)}</span>`).join('') || '';
      const actions = isOwner ? 
        `<button title="Editar" onclick="window.editNote('${note.id}')">✏️</button>
         <button title="Eliminar" onclick="window.deleteNote('${note.id}')">🗑️</button>` : '';
      
      return `
        <article class="note" style="background:${note.color||'#fff'}" data-id="${note.id}">
          <div class="note-header">
            <div style="display:flex;align-items:center;gap:0.4rem">
              <div class="avatar">${(note.author?.[0]||'U').toUpperCase()}</div>
              <span style="font-size:0.85rem;font-weight:500">${escapeHtml(note.author||'Anónimo')}</span>
              <span style="font-size:0.75rem;color:var(--text-muted)">• ${dateStr}</span>
            </div>
            <div class="note-actions">${actions}</div>
          </div>
          <h4 class="note-title">${escapeHtml(note.title)}</h4>
          ${note.content ? `<div class="note-content">${escapeHtml(note.content)}</div>`:''}
          ${media}
          ${tags ? `<div class="note-tags">${tags}</div>`:''}
          <div class="note-reactions">
            <button class="reaction-btn" onclick="window.react('${note.id}','likes')">👍 <span>${note.reactions?.likes||0}</span></button>
            <button class="reaction-btn" onclick="window.react('${note.id}','comments')">💬 <span>${note.reactions?.comments||0}</span></button>
          </div>
        </article>
      `;
    }

    // === MODAL ===
    function openNoteModal(noteId = null) {
      state.editingNoteId = noteId;
      
      if (noteId) {
        const note = state.notes.find(n => n.id === noteId);
        if (!note) return;
        document.getElementById('modalTitle').textContent = '✏️ Editar Nota';
        document.getElementById('noteTitle').value = note.title || '';
        document.getElementById('noteBody').value = note.content || '';
        document.getElementById('noteUrl').value = note.url || '';
        document.getElementById('noteTags').value = note.tags?.join(', ') || '';
        document.getElementById('notePrivate').checked = note.private || false;
        document.querySelectorAll('.post-type-btn').forEach(btn => 
          btn.classList.toggle('active', btn.dataset.type === note.type)
        );
        updateUrlField(note.type);
        document.querySelectorAll('.color-option').forEach(opt => 
          opt.classList.toggle('selected', opt.dataset.color === note.color)
        );
        state.selectedColor = note.color || '#ffffff';
      } else {
        document.getElementById('modalTitle').textContent = '✨ Nueva Nota';
        document.getElementById('noteTitle').value = '';
        document.getElementById('noteBody').value = '';
        document.getElementById('noteUrl').value = '';
        document.getElementById('noteTags').value = '';
        document.getElementById('notePrivate').checked = false;
        document.querySelectorAll('.post-type-btn').forEach((btn,i) => btn.classList.toggle('active', i===0));
        updateUrlField('text');
        document.querySelectorAll('.color-option').forEach((opt,i) => opt.classList.toggle('selected', i===0));
        state.selectedColor = '#ffffff';
      }
      
      els.noteModal.classList.add('active');
      document.body.style.overflow = 'hidden';
      document.getElementById('noteTitle').focus();
    }

    function closeModal() {
      els.noteModal.classList.remove('active');
      document.body.style.overflow = '';
      state.editingNoteId = null;
    }

    function updateUrlField(type) {
      const field = document.getElementById('fieldUrl');
      const label = document.getElementById('urlLabel');
      const hint = document.getElementById('urlHint');
      const content = document.getElementById('fieldContent');
      
      if (type === 'text') {
        field.style.display = 'none';
        content.style.display = 'block';
      } else {
        field.style.display = 'block';
        content.style.display = type === 'link' ? 'none' : 'block';
        if (type === 'image') { label.textContent = 'URL de imagen'; hint.textContent = 'JPG, PNG, GIF directo'; }
        else if (type === 'video') { label.textContent = 'URL de video'; hint.textContent = 'YouTube o MP4 directo'; }
        else if (type === 'link') { label.textContent = 'URL del enlace'; hint.textContent = 'https://...'; }
      }
    }

    async function handleSaveNote() {
      const title = document.getElementById('noteTitle').value.trim();
      if (!title) { showToast('⚠️ El título es obligatorio'); return; }
      
      const type = document.querySelector('.post-type-btn.active').dataset.type;
      const url = document.getElementById('noteUrl').value.trim();
      
      if (['image','video','link'].includes(type) && url) {
        try { new URL(url); } catch { showToast('⚠️ URL inválida (debe empezar con https://)'); return; }
      }
      
      const tags = document.getElementById('noteTags').value.split(',').map(t=>t.trim().toLowerCase()).filter(Boolean);
      
      await saveNoteToFirestore({
        type, title,
        content: type==='text'||type==='video' ? document.getElementById('noteBody').value.trim() : '',
        url: ['image','video','link'].includes(type) ? url : null,
        color: state.selectedColor, tags,
        private: document.getElementById('notePrivate').checked
      });
      
      closeModal();
    }

    // === UTILIDADES ===
    function escapeHtml(text) {
      if (!text) return '';
      const div = document.createElement('div');
      div.textContent = text;
      return div.innerHTML;
    }

    function showToast(msg, dur=3000) {
      const t = document.createElement('div');
      t.className = 'toast'; t.textContent = msg;
      els.toastContainer.appendChild(t);
      setTimeout(() => { t.style.opacity='0'; setTimeout(()=>t.remove(),300); }, dur);
    }

    function filterByTag(tag) {
      els.searchInput.value = tag;
      els.searchInput.dispatchEvent(new Event('input'));
    }

    function setupCanvasDrag() {
      let dragged = null;
      els.board.querySelectorAll('.note').forEach(el => {
        el.draggable = true;
        el.style.position = 'absolute';
        el.style.left = `${Math.random()*60+10}%`;
        el.style.top = `${Math.random()*60+10}%`;
        el.ondragstart = (e) => { dragged = el; el.classList.add('dragging'); };
        el.ondragend = () => { dragged = null; el.classList.remove('dragging'); };
      });
      els.board.ondragover = e => e.preventDefault();
      els.board.ondrop = (e) => {
        e.preventDefault();
        if (!dragged) return;
        const r = els.board.getBoundingClientRect();
        dragged.style.left = `${Math.max(0, Math.min(e.clientX-r.left-130, r.width-260))}px`;
        dragged.style.top = `${Math.max(0, Math.min(e.clientY-r.top-100, r.height-200))}px`;
      };
    }

    // === EVENT LISTENERS ===
    document.getElementById('btnNewNote').onclick = () => openNoteModal();
    document.getElementById('btnNewNoteEmpty').onclick = () => openNoteModal();
    document.getElementById('closeModal').onclick = closeModal;
    document.getElementById('cancelNote').onclick = closeModal;
    document.getElementById('saveNote').onclick = handleSaveNote;
    
    document.querySelectorAll('.post-type-btn').forEach(btn => 
      btn.onclick = () => {
        document.querySelectorAll('.post-type-btn').forEach(b=>b.classList.remove('active'));
        btn.classList.add('active');
        updateUrlField(btn.dataset.type);
      }
    );
    
    document.querySelectorAll('.color-option').forEach(opt => 
      opt.onclick = () => {
        document.querySelectorAll('.color-option').forEach(o=>o.classList.remove('selected'));
        opt.classList.add('selected');
        state.selectedColor = opt.dataset.color;
      }
    );
    
    document.querySelectorAll('.layout-btn').forEach(btn => 
      btn.onclick = () => {
        document.querySelectorAll('.layout-btn').forEach(b=>b.classList.remove('active'));
        btn.classList.add('active');
        state.currentLayout = btn.dataset.layout;
        els.board.className = `board-${state.currentLayout}`;
        renderNotes();
      }
    );
    
    els.searchInput.oninput = () => renderNotes();
    
    document.getElementById('btnExport').onclick = () => {
      const data = JSON.stringify(state.notes, null, 2);
      navigator.clipboard?.writeText(data).then(()=>showToast('📋 Copiado al portapapeles'))
        .catch(()=>{
          const blob = new Blob([data],{type:'application/json'});
          const a = document.createElement('a'); a.href=URL.createObjectURL(blob);
          a.download = `muro-${new Date().toISOString().slice(0,10)}.json`; a.click();
          showToast('📥 Archivo descargado');
        });
    };
    
    els.noteModal.onclick = (e) => { if(e.target===els.noteModal) closeModal(); };
    document.onkeydown = (e) => { if(e.key==='Escape' && els.noteModal.classList.contains('active')) closeModal(); };

    // === FUNCIONES GLOBALES ===
    window.editNote = (id) => openNoteModal(id);
    window.deleteNote = async (id) => { if(confirm('¿Eliminar esta nota?')) await deleteNoteFromFirestore(id); };
    window.react = async (id, field) => await updateReaction(id, field);
    window.filterByTag = filterByTag;
    window.closeModal = closeModal;

    // Init
    document.querySelectorAll('.post-type-btn')[0]?.click();
  </script>
</body>
</html>
