<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wall Escolar</title>
    <script src="https://www.gstatic.com/firebasejs/9.1.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.1.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.1.1/firebase-firestore-compat.js"></script>
    <style>
        body { background: #dfe6e9; font-family: 'Segoe UI', sans-serif; margin: 0; }
        #login-screen { position: fixed; top:0; left:0; width:100%; height:100%; background: #2d3436; color:white; display:flex; flex-direction:column; justify-content:center; align-items:center; z-index:1000; }
        #header { background: #0984e3; color: white; padding: 15px 25px; display: flex; justify-content: space-between; align-items:center; box-shadow: 0 4px 10px rgba(0,0,0,0.2); display:none; }
        #canvas { padding: 25px; display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap: 20px; }
        .note { padding: 20px; border-radius: 2px; box-shadow: 5px 5px 7px rgba(33,33,33,.7); transform: rotate(-2deg); transition: 0.2s; position: relative; min-height: 150px; }
        .note:nth-child(even) { transform: rotate(2deg); }
        .note:hover { transform: scale(1.05); z-index: 10; box-shadow: 10px 10px 15px rgba(0,0,0,0.3); }
        .note h3 { margin: 0 0 10px 0; font-size: 1.1em; border-bottom: 1px solid rgba(0,0,0,0.1); padding-bottom: 5px; }
        .note p { font-size: 1.05em; line-height: 1.4; color: #2d3436; }
        .note .date { position: absolute; bottom: 10px; right: 10px; font-size: 0.75em; opacity: 0.6; }
        .btn-add { background: #fab1a0; color: #2d3436; border: none; padding: 12px 24px; border-radius: 50px; cursor: pointer; font-weight: bold; font-size: 1em; }
        .btn-login { background: #74b9ff; color: white; border: none; padding: 15px 40px; border-radius: 30px; cursor: pointer; font-size: 1.2em; font-weight: bold; margin-top: 20px; }
    </style>
</head>
<body>

<div id="login-screen">
    <h1>📝 Muro Colaborativo</h1>
    <button class="btn-login" onclick="login()">Entrar con Google</button>
</div>

<div id="header">
    <span id="user-name" style="font-weight: bold;"></span>
    <button class="btn-add" onclick="addNewNote()">+ Publicar Nota</button>
</div>

<div id="canvas"></div>

<script>
  const firebaseConfig = {
    apiKey: "AIzaSyCpGmt5Va1MQVtKZtd9_p1_TA-62L1rUOc",
    authDomain: "wall-5b79c.firebaseapp.com",
    projectId: "wall-5b79c",
    storageBucket: "wall-5b79c.firebasestorage.app",
    messagingSenderId: "167646035095",
    appId: "1:167646035095:web:8286c655f6b0986b33fdd2"
  };

  firebase.initializeApp(firebaseConfig);
  const auth = firebase.auth();
  const db = firebase.firestore();

  const colors = ['#fffa65', '#7efff5', '#ffaf40', '#cd84f1', '#ffcccc', '#fff200'];

  function login() {
    const provider = new firebase.auth.GoogleAuthProvider();
    auth.signInWithPopup(provider).then(result => {
        document.getElementById('login-screen').style.display = 'none';
        document.getElementById('header').style.display = 'flex';
        document.getElementById('user-name').innerText = "Hola, " + result.user.displayName;
        listenNotes();
    });
  }

  function addNewNote() {
    const text = prompt("Escribe tu mensaje para el muro:");
    if (text) {
        const randomColor = colors[Math.floor(Math.random() * colors.length)];
        db.collection("notes").add({
            content: text,
            author: auth.currentUser.displayName,
            color: randomColor,
            date: new Date()
        });
    }
  }

  function listenNotes() {
    db.collection("notes").orderBy("date", "desc").onSnapshot(snapshot => {
        const canvas = document.getElementById('canvas');
        canvas.innerHTML = "";
        snapshot.forEach(doc => {
            const data = doc.data();
            const noteDiv = document.createElement('div');
            noteDiv.className = 'note';
            noteDiv.style.backgroundColor = data.color || '#fff9c4';
            
            const dateStr = data.date ? new Date(data.date.seconds * 1000).toLocaleString() : '';
            
            noteDiv.innerHTML = `
                <h3>${data.author}</h3>
                <p>${data.content}</p>
                <div class="date">${dateStr}</div>
            `;
            canvas.appendChild(noteDiv);
        });
    });
  }
</script>
</body>
</html>
