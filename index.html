<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Muro Escolar - Privado</title>
    
    <script src="https://www.gstatic.com/firebasejs/9.1.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.1.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.1.1/firebase-firestore-compat.js"></script>

    <style>
        :root {
            --primary: #0984e3;
            --success: #00b894;
            --danger: #d63031;
            --bg-verde: #81ecec; 
        }

        body { 
            margin: 0; 
            font-family: 'Segoe UI', sans-serif; 
            background: var(--bg-verde) url('https://www.transparenttextures.com/patterns/notebook-dark.png'); 
            min-height: 100vh;
        }

        /* --- PORTADA --- */
        #login-screen { 
            position: fixed; top:0; left:0; width:100%; height:100%; 
            background: linear-gradient(rgba(108, 92, 231, 0.8), rgba(9, 132, 227, 0.8)), 
                        url('https://images.unsplash.com/photo-1517245386807-bb43f82c33c4?ixlib=rb-1.2.1&auto=format&fit=crop&w=1350&q=80');
            background-size: cover; background-position: center;
            display:none; flex-direction:column; justify-content:center; align-items:center; z-index:4000; 
            text-align: center; color: white; padding: 20px; box-sizing: border-box;
        }

        .login-card { 
            background: white; padding: 30px; border-radius: 24px; 
            box-shadow: 0 20px 50px rgba(0,0,0,0.4); width: 90%; max-width: 320px; color: #2d3436;
        }

        .btn-google { 
            background: white; color: #2d3436; border: 2px solid #dfe6e9; padding: 12px; 
            border-radius: 12px; cursor: pointer; font-weight: bold; width: 100%;
            display: flex; align-items: center; justify-content: center; gap: 10px;
        }

        /* --- INTERFAZ PRIVADA --- */
        #header { 
            background: rgba(255, 255, 255, 0.96); padding: 10px 15px; 
            display: none; justify-content: space-between; align-items:center; 
            box-shadow: 0 4px 15px rgba(0,0,0,0.1); position: sticky; top: 0; z-index: 1000; 
        }

        #canvas { 
            padding: 25px 15px; display: flex; flex-direction: column; gap: 25px; align-items: center; 
        }

        /* --- NOTAS MEJORADAS (Menos anchas y privadas) --- */
        .note { 
            padding: 30px 20px 25px; border-radius: 2px; 
            box-shadow: 8px 8px 15px rgba(0,0,0,0.2); 
            position: relative; transition: 0.3s;
            /* CORRECCIÓN ANCHO: No toca las orillas */
            width: 85%; max-width: 300px; 
            min-height: 220px; /* CUERPO VERTICAL */
            display: flex; flex-direction: column; box-sizing: border-box;
        }
        
        .note::before { 
            content: ""; position: absolute; top: -8px; left: 50%; transform: translateX(-50%);
            width: 16px; height: 16px; background: #e74c3c; border-radius: 50%; 
            box-shadow: 2px 2px 4px rgba(0,0,0,0.3);
        }

        .note img { width: 100%; border-radius: 4px; margin-bottom: 12px; max-height: 180px; object-fit: cover; }
        .note h3 { margin: 0 0 8px 0; font-size: 0.75em; text-transform: uppercase; color: rgba(0,0,0,0.4); border-bottom: 1px solid rgba(0,0,0,0.1); }
        .note p { margin: 0; font-size: 1.1em; line-height: 1.4; color: #333; word-wrap: break-word; flex-grow: 1; }

        .actions { position: absolute; top: 8px; right: 8px; display: flex; gap: 8px; }
        .action-btn { background: rgba(255,255,255,0.6); border: none; border-radius: 4px; cursor: pointer; font-size: 1em; padding: 2px 4px; }

        .btn-add { background: var(--success); color: white; border: none; padding: 8px 15px; border-radius: 8px; cursor: pointer; font-weight: bold; font-size: 0.9em; }
    </style>
</head>
<body>

<div id="loading-screen"><h3>Validando sesión...</h3></div>

<div id="login-screen">
    <div style="margin-bottom: 20px;">
        <h1 style="font-size: 3em; margin: 0;">Wall Escolar</h1>
        <p>Tu espacio personal de ideas.</p>
    </div>
    <div class="login-card">
        <h3>¡Bienvenido!</h3>
        <p style="font-size: 0.9em; color: #636e72;">Inicia sesión para ver <b>tus</b> notas.</p>
        <button class="btn-google" onclick="login()">
            <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" width="16">
            Entrar con Google
        </button>
    </div>
    <p style="margin-top:20px; font-size:0.8em; color:white;">Copyright 2026 - Marcelo Tonini</p>
</div>

<div id="header">
    <h2 style="margin:0; font-size:1em;">📌 Mis Ideas</h2>
    <div style="display:flex; align-items:center; gap:10px">
        <button onclick="logout()" style="background:none; border:none; color:var(--danger); cursor:pointer; font-size:0.75em; font-weight:bold">SALIR</button>
        <button class="btn-add" onclick="addNewNote()">+ NOTA</button>
    </div>
</div>

<div id="canvas"></div>

<script>
  // Configuración de tu Firebase
  const firebaseConfig = {
    apiKey: "AIzaSyCpGmt5Va1MQVtKZtd9_p1_TA-62L1rUOc",
    authDomain: "wall-5b79c.firebaseapp.com",
    projectId: "wall-5b79c",
    storageBucket: "wall-5b79c.firebasestorage.app",
    messagingSenderId: "167646035095",
    appId: "1:167646035095:web:8286c655f6b0986b33fdd2"
  };

  firebase.initializeApp(firebaseConfig);
  const auth = firebase.auth();
  const db = firebase.firestore();

  auth.onAuthStateChanged(user => {
    document.getElementById('loading-screen').style.display = 'none';
    if (user) {
        document.getElementById('login-screen').style.display = 'none';
        document.getElementById('header').style.display = 'flex';
        listenNotes(user.uid); // Pasamos tu ID único para filtrar
    } else {
        document.getElementById('login-screen').style.display = 'flex';
        document.getElementById('header').style.display = 'none';
        document.getElementById('canvas').innerHTML = "";
    }
  });

  function login() { auth.signInWithPopup(new firebase.auth.GoogleAuthProvider()); }
  function logout() { if(confirm("¿Cerrar sesión?")) auth.signOut(); }

  function addNewNote() {
    const text = prompt("Escribe tu idea:");
    if (!text || text.trim() === "") return;
    
    db.collection("notes").add({
        content: text,
        imageUrl: null,
        author: auth.currentUser.displayName,
        authorId: auth.currentUser.uid, // Guardamos tu ID para que sea privada
        color: ['#fff740', '#7efff5', '#ffaf40', '#cd84f1', '#ffcccc'][Math.floor(Math.random() * 5)],
        rotation: (Math.random() * 4 - 2).toFixed(1),
        date: firebase.firestore.FieldValue.serverTimestamp()
    });
  }

  function editNote(id, currentText) {
    const newText = prompt("Editar:", currentText);
    if (newText && newText.trim() !== "" && newText !== currentText) {
        db.collection("notes").doc(id).update({ content: newText });
    }
  }

  function addImageToNote(id) {
    const url = prompt("Link de la imagen:");
    if (url) db.collection("notes").doc(id).update({ imageUrl: url.trim() });
  }

  function deleteNote(id) { if(confirm("¿Borrar?")) db.collection("notes").doc(id).delete(); }

  // FILTRO DE PRIVACIDAD ACTIVADO
  function listenNotes(uid) {
    db.collection("notes")
      .where("authorId", "==", uid) // SOLO tus notas
      .orderBy("date", "desc")
      .onSnapshot(snapshot => {
        const canvas = document.getElementById('canvas');
        canvas.innerHTML = "";
        snapshot.forEach(doc => {
            const data = doc.data();
            const noteDiv = document.createElement('div');
            noteDiv.className = 'note';
            noteDiv.style.backgroundColor = data.color;
            noteDiv.style.transform = `rotate(${data.rotation}deg)`;
            noteDiv.innerHTML = `
                <div class="actions">
                    <button class="action-btn" onclick="addImageToNote('${doc.id}')">🖼️</button>
                    <button class="action-btn" onclick="editNote('${doc.id}', '${data.content.replace(/'/g, "\\'")}')">✏️</button>
                    <button class="action-btn" onclick="deleteNote('${doc.id}')" style="color:red">X</button>
                </div>
                ${data.imageUrl ? `<img src="${data.imageUrl}" onerror="this.style.display='none'">` : ''}
                <h3>${data.author}</h3>
                <p>${data.content}</p>
            `;
            canvas.appendChild(noteDiv);
        });
    });
  }
</script>
</body>
</html>
