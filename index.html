<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>📌 Muro de Ideas Pro - Wall Escolar</title>
  <style>
    :root {
      --primary: #4f46e5; --primary-hover: #4338ca;
      --bg: #f8fafc; --card-bg: #ffffff; --text: #0f172a;
      --text-muted: #64748b; --border: #e2e8f0;
      --success: #22c55e; --danger: #ef4444;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Segoe UI', system-ui, sans-serif;
      background: var(--bg); color: var(--text);
      line-height: 1.5; min-height: 100vh;
    }

    /* === LANDING PAGE === */
    .landing {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 2rem 1rem;
      text-align: center;
      background: linear-gradient(135deg, rgba(102, 126, 234, 0.15) 0%, rgba(118, 75, 162, 0.15) 100%);
      background-size: cover;
      background-position: center;
      color: var(--text);
      position: relative;
    }
    .landing::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0; bottom: 0;
      background: rgba(102, 126, 234, 0.08);
      pointer-events: none;
    }
    .landing > * { position: relative; z-index: 1; }
    .landing.hidden { display: none !important; }
    
    .landing-logo {
      font-size: 2rem;
      font-weight: 800;
      margin-bottom: 0.5rem;
      display: flex;
      align-items: center;
      gap: 0.5rem;
      justify-content: center;
      color: var(--text);
    }
    .landing-subtitle {
      font-size: 1rem;
      color: var(--text-muted);
      margin-bottom: 1rem;
      font-weight: 400;
    }
    .landing-description {
      font-size: 0.95rem;
      color: var(--text-muted);
      max-width: 400px;
      margin: 0 auto 1.5rem;
      line-height: 1.6;
    }
    
    .google-btn {
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      background: white;
      color: #333;
      border: none;
      padding: 0.8rem 1.5rem;
      border-radius: 12px;
      font-weight: 600;
      font-size: 0.95rem;
      cursor: pointer;
      box-shadow: 0 4px 20px rgba(0,0,0,0.15);
      transition: transform 0.15s, box-shadow 0.15s;
    }
    .google-btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 30px rgba(0,0,0,0.2);
    }
    .google-btn img { width: 20px; height: 20px; }
    
    .welcome-msg {
      margin-top: 1.5rem;
      font-size: 0.95rem;
      color: var(--primary);
      font-weight: 500;
    }

    .landing-footer {
      position: absolute;
      bottom: 1rem;
      left: 0;
      right: 0;
      text-align: center;
      font-size: 0.75rem;
      color: var(--text-muted);
      z-index: 1;
    }

    /* === APP UI === */
    .app-ui { display: none; }
    .app-ui.visible { display: block; }
    
    header {
      background: white;
      color: var(--text);
      padding: 0.7rem 1rem;
      display: flex;
      justify-content: space-between;
      align-items: center;
      position: sticky;
      top: 0;
      z-index: 100;
      border-bottom: 1px solid var(--border);
      box-shadow: 0 1px 4px rgba(0,0,0,0.05);
    }
    .header-title {
      font-size: 1.1rem;
      font-weight: 700;
      display: flex;
      align-items: center;
      gap: 0.3rem;
    }
    .user-section { display: flex; align-items: center; gap: 0.5rem; }
    .user-info { text-align: right; display: none; }
    .user-info.show { display: block; }
    .user-name { font-weight: 600; font-size: 0.8rem; }
    .user-email { font-size: 0.65rem; color: var(--text-muted); display: none; }
    .avatar {
      width: 32px; height: 32px; border-radius: 50%;
      background: var(--primary); color: white;
      display: flex; align-items: center; justify-content: center;
      font-weight: 700; font-size: 0.8rem;
    }
    
    .toolbar {
      padding: 0.6rem 1rem;
      background: white;
      border-bottom: 1px solid var(--border);
      display: flex;
      gap: 0.4rem;
      flex-wrap: wrap;
      align-items: center;
      position: sticky;
      top: 52px;
      z-index: 99;
    }
    .btn {
      padding: 0.45rem 0.85rem;
      border: none;
      border-radius: 8px;
      background: var(--primary);
      color: white;
      cursor: pointer;
      font-weight: 500;
      font-size: 0.85rem;
      display: inline-flex;
      align-items: center;
      gap: 0.25rem;
      transition: background 0.2s;
      white-space: nowrap;
    }
    .btn:hover { background: var(--primary-hover); }
    .btn-outline {
      background: transparent;
      border: 1px solid var(--border);
      color: var(--text);
    }
    .btn-outline:hover { background: #f8fafc; }
    .btn-sm { padding: 0.25rem 0.5rem; font-size: 0.75rem; }
    
    .search-box {
      display: flex;
      align-items: center;
      background: #f8fafc;
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 0.25rem 0.6rem;
      flex: 1;
      min-width: 120px;
    }
    .search-box input {
      border: none;
      background: transparent;
      padding: 0.25rem;
      font-size: 0.85rem;
      width: 100%;
      outline: none;
    }
    
    .toolbar-right {
      display: flex;
      gap: 0.3rem;
      align-items: center;
      margin-left: auto;
    }
    
    /* Selector de color de fondo - SIEMPRE VISIBLE */
    .bg-color-selector {
      display: flex;
      gap: 0.25rem;
      align-items: center;
      padding: 0.2rem 0.5rem;
      background: #f8fafc;
      border: 1px solid var(--border);
      border-radius: 20px;
    }
    .bg-color-option {
      width: 22px;
      height: 22px;
      border-radius: 50%;
      border: 2px solid transparent;
      cursor: pointer;
      transition: transform 0.15s, border-color 0.2s;
    }
    .bg-color-option:hover { transform: scale(1.2); }
    .bg-color-option.active {
      border-color: var(--text);
      box-shadow: 0 0 0 2px white;
    }
    
    #board {
      padding: 1rem;
      min-height: calc(100vh - 130px);
      transition: background 0.3s;
    }
    
    /* GRID */
    .board-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
      gap: 1rem;
      align-items: start;
    }
    
    .note {
      background: var(--card-bg);
      border-radius: 10px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.06);
      border: 1px solid var(--border);
      transition: transform 0.15s, box-shadow 0.15s;
      position: relative;
      overflow: hidden;
    }
    .note:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 24px rgba(0,0,0,0.1);
    }
    
    .board-grid .note {
      padding: 0.9rem;
      height: auto;
      display: flex;
      flex-direction: column;
    }
    
    .note-header {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      margin-bottom: 0.6rem;
      padding-bottom: 0.5rem;
      border-bottom: 1px solid var(--border);
    }
    .note-author {
      display: flex;
      align-items: center;
      gap: 0.35rem;
      font-size: 0.8rem;
      font-weight: 500;
    }
    .note-author .avatar {
      width: 22px; height: 22px;
      font-size: 0.7rem;
    }
    .note-date {
      font-size: 0.7rem;
      color: var(--text-muted);
    }
    .note-actions { display: flex; gap: 0.15rem; }
    .note-actions button {
      background: none;
      border: none;
      cursor: pointer;
      font-size: 0.95rem;
      opacity: 0.7;
      padding: 0.15rem;
      border-radius: 4px;
    }
    .note-actions button:hover {
      opacity: 1;
      background: #f1f5f9;
    }
    .note-title {
      font-weight: 600;
      margin-bottom: 0.35rem;
      font-size: 0.95rem;
    }
    .note-content {
      margin-bottom: 0.6rem;
      color: #334155;
      white-space: pre-wrap;
      flex: 1;
      font-size: 0.9rem;
    }
    
    .note-content img {
      max-width: 100%;
      max-height: 250px;
      width: auto;
      height: auto;
      object-fit: contain;
      border-radius: 6px;
      margin-top: 0.35rem;
      display: block;
    }
    
    .note-content video {
      max-width: 100%;
      max-height: 250px;
      border-radius: 6px;
      margin-top: 0.35rem;
      display: block;
    }
    
    .note-content iframe {
      max-width: 100%;
      border-radius: 6px;
      margin-top: 0.35rem;
      aspect-ratio: 16/9;
    }
    
    .note-content a.link-card {
      display: block;
      padding: 0.6rem;
      background: #f8fafc;
      border-radius: 6px;
      text-decoration: none;
      color: var(--primary);
      margin-top: 0.35rem;
      border: 1px solid var(--border);
      word-break: break-all;
      font-size: 0.85rem;
    }
    .note-content a.link-card:hover { background: #f1f5f9; }
    
    .note-tags {
      display: flex;
      flex-wrap: wrap;
      gap: 0.25rem;
      margin-bottom: 0.6rem;
    }
    .tag {
      font-size: 0.65rem;
      padding: 0.15rem 0.4rem;
      background: #eef2ff;
      color: var(--primary);
      border-radius: 20px;
      font-weight: 500;
      cursor: pointer;
    }
    .tag:hover { background: #dbeafe; }
    
    .note-reactions {
      display: flex;
      gap: 0.7rem;
      font-size: 0.8rem;
      color: var(--text-muted);
      border-top: 1px solid var(--border);
      padding-top: 0.5rem;
      margin-top: auto;
    }
    .reaction-btn {
      display: flex;
      align-items: center;
      gap: 0.15rem;
      background: none;
      border: none;
      cursor: pointer;
      padding: 0.15rem 0.3rem;
      border-radius: 4px;
      transition: all 0.2s;
    }
    .reaction-btn:hover { background: #f1f5f9; }
    .reaction-btn.active {
      color: var(--primary);
      font-weight: 600;
      background: #eef2ff;
    }
    
    /* MODAL */
    .modal {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.5);
      z-index: 200;
      align-items: center;
      justify-content: center;
      padding: 1rem;
    }
    .modal.active { display: flex; }
    .modal-content {
      background: white;
      border-radius: 14px;
      width: 100%;
      max-width: 480px;
      max-height: 90vh;
      overflow-y: auto;
      box-shadow: 0 20px 60px rgba(0,0,0,0.25);
    }
    .modal-header {
      padding: 1rem 1.2rem;
      border-bottom: 1px solid var(--border);
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .modal-header h3 { font-size: 1.1rem; }
    .modal-body { padding: 1.2rem; }
    .modal-footer {
      padding: 0.8rem 1.2rem;
      border-top: 1px solid var(--border);
      display: flex;
      justify-content: flex-end;
      gap: 0.4rem;
    }
    .form-group { margin-bottom: 0.9rem; }
    .form-group label {
      display: block;
      margin-bottom: 0.35rem;
      font-weight: 500;
      font-size: 0.85rem;
    }
    .form-group input,
    .form-group textarea {
      width: 100%;
      padding: 0.65rem 0.8rem;
      border: 1px solid var(--border);
      border-radius: 8px;
      font-size: 0.9rem;
    }
    .form-group input:focus,
    .form-group textarea:focus {
      outline: none;
      border-color: var(--primary);
    }
    .form-group textarea {
      min-height: 80px;
      resize: vertical;
    }
    .form-hint {
      font-size: 0.7rem;
      color: var(--text-muted);
      margin-top: 0.25rem;
    }
    
    .post-types {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 0.35rem;
    }
    .post-type-btn {
      padding: 0.6rem 0.3rem;
      border: 1px solid var(--border);
      border-radius: 8px;
      background: white;
      cursor: pointer;
      text-align: center;
      font-size: 0.75rem;
    }
    .post-type-btn:hover,
    .post-type-btn.active {
      border-color: var(--primary);
      background: #eef2ff;
      color: var(--primary);
    }
    .post-type-btn .icon {
      font-size: 1.1rem;
      display: block;
      margin-bottom: 0.15rem;
    }
    
    .color-picker {
      display: flex;
      gap: 0.35rem;
      flex-wrap: wrap;
    }
    .color-option {
      width: 28px;
      height: 28px;
      border-radius: 50%;
      border: 2px solid transparent;
      cursor: pointer;
    }
    .color-option:hover { transform: scale(1.15); }
    .color-option.selected {
      border-color: var(--text);
      box-shadow: 0 0 0 2px white;
    }
    
    /* Comentarios */
    .comments-section {
      margin-top: 0.6rem;
      padding-top: 0.5rem;
      border-top: 1px solid var(--border);
      max-height: 200px;
      overflow-y: auto;
    }
    .comment {
      padding: 0.4rem;
      margin-bottom: 0.4rem;
      background: #f8fafc;
      border-radius: 6px;
      font-size: 0.8rem;
    }
    .comment-author {
      font-weight: 600;
      color: var(--primary);
      font-size: 0.75rem;
      margin-bottom: 0.2rem;
    }
    .comment-text {
      color: var(--text);
      word-break: break-word;
    }
    .comment-form {
      display: flex;
      gap: 0.3rem;
      margin-top: 0.5rem;
    }
    .comment-form input {
      flex: 1;
      padding: 0.4rem 0.6rem;
      border: 1px solid var(--border);
      border-radius: 20px;
      font-size: 0.8rem;
      outline: none;
    }
    .comment-form input:focus {
      border-color: var(--primary);
    }
    .comment-form button {
      padding: 0.4rem 0.8rem;
      background: var(--primary);
      color: white;
      border: none;
      border-radius: 20px;
      cursor: pointer;
      font-size: 0.8rem;
    }
    .comment-form button:hover {
      background: var(--primary-hover);
    }
    
    .empty-state {
      text-align: center;
      padding: 2.5rem 1rem;
      color: var(--text-muted);
    }
    .empty-state .icon {
      font-size: 2.5rem;
      margin-bottom: 0.8rem;
      display: block;
    }
    .empty-state p { margin-bottom: 0.8rem; font-size: 0.95rem; }
    
    .toast {
      position: fixed;
      bottom: 1rem;
      right: 1rem;
      left: 1rem;
      background: #1e293b;
      color: white;
      padding: 0.7rem 1rem;
      border-radius: 10px;
      box-shadow: 0 8px 24px rgba(0,0,0,0.2);
      z-index: 300;
      animation: slideIn 0.3s ease;
      text-align: center;
      font-size: 0.85rem;
    }
    @keyframes slideIn {
      from { transform: translateY(100px); opacity: 0; }
      to { transform: translateY(0); opacity: 1; }
    }
    
    .loading {
      text-align: center;
      padding: 2rem;
      color: var(--text-muted);
    }
    .loading::after {
      content: "⋯";
      animation: dots 1.5s steps(4, end) infinite;
    }
    @keyframes dots {
      0%, 20% { content: "."; }
      40% { content: ".."; }
      60%, 100% { content: "..."; }
    }
    
    /* MOBILE */
    @media (max-width: 640px) {
      .landing-logo { font-size: 1.7rem; }
      .landing-subtitle { font-size: 0.9rem; }
      .landing-description { font-size: 0.85rem; }
      
      header { padding: 0.6rem 0.8rem; }
      .header-title { font-size: 1rem; }
      .user-email { display: none; }
      .user-name { font-size: 0.75rem; }
      
      .toolbar {
        padding: 0.5rem 0.8rem;
        top: 48px;
      }
      .btn { padding: 0.4rem 0.7rem; font-size: 0.8rem; }
      .search-box { min-width: 100px; }
      .search-box input { font-size: 0.8rem; }
      
      /* Selector de fondo SIEMPRE visible en móvil */
      .bg-color-selector { 
        display: flex;
      }
      
      .note-header { margin-bottom: 0.5rem; padding-bottom: 0.4rem; }
      .note-title { font-size: 0.9rem; }
      .note-content { font-size: 0.85rem; }
      .note-content img, .note-content video { max-height: 200px; }
      
      .modal-content { max-width: 95vw; border-radius: 12px; }
      .modal-header { padding: 0.9rem 1rem; }
      .modal-body { padding: 1rem; }
      .modal-footer { padding: 0.7rem 1rem; }
      
      .post-types { grid-template-columns: repeat(3, 1fr); gap: 0.25rem; }
      .post-type-btn { padding: 0.5rem 0.2rem; font-size: 0.7rem; }
      .post-type-btn .icon { font-size: 1rem; }
    }
  </style>
</head>
<body>

  <!-- === LANDING PAGE === -->
  <main class="landing" id="landingPage">
    <div class="landing-logo">📌 Muro de Ideas Pro</div>
    <div class="landing-subtitle">Wall Escolar</div>
    <p class="landing-description">Tu espacio profesional de ideas.</p>
    
    <button class="google-btn" id="googleLogin">
      <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" alt="G">
      Entrar con Google
    </button>
    
    <p class="welcome-msg" id="welcomeMsg" style="display:none;">¡Bienvenido!</p>
    
    <footer class="landing-footer">
      © 2026 - Desarrollado por Marcelo Tonini
    </footer>
  </main>

  <!-- === APP UI === -->
  <div class="app-ui" id="appUI">
    
    <header>
      <div class="header-title">📌 Muro de Ideas</div>
      <div class="user-section">
        <div class="user-info" id="userInfo">
          <div class="user-name" id="userName"></div>
          <div class="user-email" id="userEmail"></div>
        </div>
        <div class="avatar" id="userAvatar">U</div>
        <button class="btn btn-outline btn-sm" id="btnLogout">SALIR</button>
      </div>
    </header>

    <div class="toolbar">
      <button class="btn" id="btnNewNote">+ NOTA</button>
      
      <div class="toolbar-right">
        <div class="search-box">
          <input type="search" id="searchInput" placeholder="Buscar...">
        </div>
        
        <!-- Selector de color de fondo - SIEMPRE VISIBLE -->
        <div class="bg-color-selector" id="bgColorSelector" title="Color de fondo">
          <div class="bg-color-option active" style="background:#f8fafc" data-color="#f8fafc"></div>
          <div class="bg-color-option" style="background:#fef3c7" data-color="#fef3c7"></div>
          <div class="bg-color-option" style="background:#dbeafe" data-color="#dbeafe"></div>
          <div class="bg-color-option" style="background:#dcfce7" data-color="#dcfce7"></div>
          <div class="bg-color-option" style="background:#fce7f3" data-color="#fce7f3"></div>
          <div class="bg-color-option" style="background:#f3e8ff" data-color="#f3e8ff"></div>
        </div>
      </div>
    </div>

    <main id="board" class="board-grid">
      <div class="empty-state" id="emptyState">
        <span class="icon">✨</span>
        <p><strong>¡Tu muro está vacío!</strong></p>
        <button class="btn" id="btnNewNoteEmpty">+ Crear primera nota</button>
      </div>
    </main>

  </div>

  <!-- Modal Nueva/Editar Nota -->
  <div class="modal" id="noteModal">
    <div class="modal-content">
      <div class="modal-header">
        <h3 id="modalTitle">✨ Nueva Nota</h3>
        <button class="btn btn-outline btn-sm" id="closeModal">✕</button>
      </div>
      <div class="modal-body">
        <div class="form-group">
          <label>Tipo de contenido</label>
          <div class="post-types">
            <button class="post-type-btn active" data-type="text"><span class="icon">📝</span>Texto</button>
            <button class="post-type-btn" data-type="image"><span class="icon">🖼️</span>Imagen</button>
            <button class="post-type-btn" data-type="video"><span class="icon">🎬</span>Video</button>
            <button class="post-type-btn" data-type="link"><span class="icon">🔗</span>Enlace</button>
          </div>
        </div>
        <div class="form-group">
          <label for="noteTitle">Título *</label>
          <input type="text" id="noteTitle" placeholder="Ej: Idea para el proyecto">
        </div>
        <div class="form-group" id="fieldContent">
          <label for="noteBody">Contenido</label>
          <textarea id="noteBody" placeholder="Escribe tu idea..."></textarea>
        </div>
        <div class="form-group" id="fieldUrl" style="display:none;">
          <label for="noteUrl" id="urlLabel">URL</label>
          <input type="url" id="noteUrl" placeholder="https://ejemplo.com/imagen.jpg">
          <div class="form-hint" id="urlHint">Pega un enlace directo</div>
        </div>
        <div class="form-group">
          <label>Color de nota:</label>
          <div class="color-picker">
            <div class="color-option selected" style="background:#fff" data-color="#ffffff"></div>
            <div class="color-option" style="background:#fef3c7" data-color="#fef3c7"></div>
            <div class="color-option" style="background:#dbeafe" data-color="#dbeafe"></div>
            <div class="color-option" style="background:#dcfce7" data-color="#dcfce7"></div>
            <div class="color-option" style="background:#fce7f3" data-color="#fce7f3"></div>
            <div class="color-option" style="background:#f3e8ff" data-color="#f3e8ff"></div>
          </div>
        </div>
        <div class="form-group">
          <label for="noteTags">Etiquetas</label>
          <input type="text" id="noteTags" placeholder="matemáticas, equipo, urgente">
          <div class="form-hint">Separa con comas</div>
        </div>
        <div class="form-group">
          <label><input type="checkbox" id="notePrivate"> 🔒 Nota privada (solo yo)</label>
        </div>
      </div>
      <div class="modal-footer">
        <button class="btn btn-outline" id="cancelNote">Cancelar</button>
        <button class="btn" id="saveNote">GUARDAR</button>
      </div>
    </div>
  </div>

  <!-- Modal Comentarios -->
  <div class="modal" id="commentsModal">
    <div class="modal-content">
      <div class="modal-header">
        <h3 id="commentsModalTitle">💬 Comentarios</h3>
        <button class="btn btn-outline btn-sm" id="closeCommentsModal">✕</button>
      </div>
      <div class="modal-body">
        <div id="commentsList" class="comments-section"></div>
        <div class="comment-form">
          <input type="text" id="commentInput" placeholder="Escribe un comentario...">
          <button id="addCommentBtn">Enviar</button>
        </div>
      </div>
    </div>
  </div>

  <div id="toastContainer"></div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.14.0/firebase-app.js";
    import { getAuth, GoogleAuthProvider, signInWithPopup, signOut, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.14.0/firebase-auth.js";
    import { getFirestore, collection, addDoc, updateDoc, deleteDoc, doc, onSnapshot, query, orderBy, serverTimestamp, arrayUnion, arrayRemove } from "https://www.gstatic.com/firebasejs/10.14.0/firebase-firestore.js";

    const firebaseConfig = {
      apiKey: "AIzaSyCpGmt5Va1MQVtKZtd9_p1_TA-62L1rUOc",
      authDomain: "wall-5b79c.firebaseapp.com",
      projectId: "wall-5b79c",
      storageBucket: "wall-5b79c.firebasestorage.app",
      messagingSenderId: "167646035095",
      appId: "1:167646035095:web:8286c655f6b0986b33fdd2",
      measurementId: "G-PKW4S5Q177"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);
    const provider = new GoogleAuthProvider();

    const state = {
      currentUser: null,
      boardId: 'default_board',
      notes: [],
      unsubscribe: null,
      selectedColor: '#ffffff',
      boardBgColor: '#f8fafc',
      editingNoteId: null,
      currentNoteId: null // Para comentarios
    };

    const els = {
      landingPage: document.getElementById('landingPage'),
      appUI: document.getElementById('appUI'),
      welcomeMsg: document.getElementById('welcomeMsg'),
      board: document.getElementById('board'),
      emptyState: document.getElementById('emptyState'),
      noteModal: document.getElementById('noteModal'),
      commentsModal: document.getElementById('commentsModal'),
      searchInput: document.getElementById('searchInput'),
      toastContainer: document.getElementById('toastContainer'),
      bgColorSelector: document.getElementById('bgColorSelector'),
      userInfo: document.getElementById('userInfo')
    };

    // === AUTH ===
    onAuthStateChanged(auth, (user) => {
      if (user) {
        state.currentUser = user;
        document.getElementById('userName').textContent = user.displayName || 'Usuario';
        document.getElementById('userEmail').textContent = user.email;
        document.getElementById('userAvatar').textContent = (user.displayName?.[0] || 'U').toUpperCase();
        els.userInfo.classList.add('show');
        
        els.landingPage.classList.add('hidden');
        els.appUI.classList.add('visible');
        
        subscribeToNotes();
      } else {
        state.currentUser = null;
        if (state.unsubscribe) state.unsubscribe();
        els.userInfo.classList.remove('show');
        
        els.landingPage.classList.remove('hidden');
        els.appUI.classList.remove('visible');
      }
    });

    document.getElementById('googleLogin').onclick = async () => {
      try {
        await signInWithPopup(auth, provider);
        showToast('✅ ¡Bienvenido!');
        els.welcomeMsg.style.display = 'block';
        setTimeout(() => els.welcomeMsg.style.display = 'none', 2000);
      } catch (error) {
        showToast('❌ Error: ' + (error.message || 'Revisa la consola'));
      }
    };

    document.getElementById('btnLogout').onclick = async () => {
      await signOut(auth);
      showToast('👋 Sesión cerrada');
    };

    // === FIRESTORE ===
    function subscribeToNotes() {
      if (state.unsubscribe) state.unsubscribe();
      
      els.board.innerHTML = '<div class="loading">Cargando</div>';
      
      const q = query(collection(db, 'boards', state.boardId, 'notes'), orderBy('createdAt', 'desc'));
      
      state.unsubscribe = onSnapshot(q, 
        (snapshot) => {
          state.notes = snapshot.docs.map(d => ({ id: d.id, ...d.data() }));
          renderNotes();
        },
        (error) => {
          console.error('Error:', error);
          els.board.innerHTML = '';
          els.board.appendChild(els.emptyState);
        }
      );
    }

    async function saveNoteToFirestore(noteData) {
      const notesRef = collection(db, 'boards', state.boardId, 'notes');
      
      if (state.editingNoteId) {
        await updateDoc(doc(notesRef, state.editingNoteId), {
          ...noteData,
          updatedAt: serverTimestamp()
        });
        showToast('✅ Actualizada');
      } else {
        await addDoc(notesRef, {
          ...noteData,
          authorId: state.currentUser.uid,
          author: state.currentUser.displayName || 'Usuario',
          createdAt: serverTimestamp(),
          updatedAt: serverTimestamp(),
          reactions: { likes: 0, comments: 0 },
          likedBy: [], // Array de user IDs que dieron like
          comments: [] // Array de comentarios
        });
        showToast('✅ Creada');
      }
    }

    async function deleteNoteFromFirestore(noteId) {
      await deleteDoc(doc(db, 'boards', state.boardId, 'notes', noteId));
      showToast('🗑️ Eliminada');
    }

    // Toggle like - CORREGIDO
    async function toggleLike(noteId) {
      const noteRef = doc(db, 'boards', state.boardId, 'notes', noteId);
      const note = state.notes.find(n => n.id === noteId);
      if (!note) return;
      
      const userId = state.currentUser.uid;
      const hasLiked = note.likedBy?.includes(userId);
      
      if (hasLiked) {
        // Quitar like
        await updateDoc(noteRef, {
          likedBy: arrayRemove(userId),
          'reactions.likes': note.reactions?.likes > 0 ? note.reactions.likes - 1 : 0
        });
      } else {
        // Dar like
        await updateDoc(noteRef, {
          likedBy: arrayUnion(userId),
          'reactions.likes': (note.reactions?.likes || 0) + 1
        });
      }
    }

    // Abrir modal de comentarios - CORREGIDO
    function openCommentsModal(noteId) {
      state.currentNoteId = noteId;
      const note = state.notes.find(n => n.id === noteId);
      if (!note) return;
      
      document.getElementById('commentsModalTitle').textContent = `💬 Comentarios (${note.reactions?.comments || 0})`;
      renderComments(note);
      els.commentsModal.classList.add('active');
      document.getElementById('commentInput').focus();
    }

    function closeCommentsModal() {
      els.commentsModal.classList.remove('active');
      state.currentNoteId = null;
    }

    function renderComments(note) {
      const list = document.getElementById('commentsList');
      const comments = note.comments || [];
      
      if (comments.length === 0) {
        list.innerHTML = '<p style="text-align:center;color:var(--text-muted);padding:1rem;">Sin comentarios aún</p>';
      } else {
        list.innerHTML = comments.map(c => `
          <div class="comment">
            <div class="comment-author">${escapeHtml(c.author)}</div>
            <div class="comment-text">${escapeHtml(c.text)}</div>
          </div>
        `).join('');
      }
    }

    async function addComment() {
      const input = document.getElementById('commentInput');
      const text = input.value.trim();
      if (!text || !state.currentNoteId) return;
      
      const noteRef = doc(db, 'boards', state.boardId, 'notes', state.currentNoteId);
      const note = state.notes.find(n => n.id === state.currentNoteId);
      
      await updateDoc(noteRef, {
        comments: arrayUnion({
          author: state.currentUser.displayName || 'Usuario',
          authorId: state.currentUser.uid,
          text: text,
          createdAt: serverTimestamp()
        }),
        'reactions.comments': (note.reactions?.comments || 0) + 1
      });
      
      input.value = '';
      showToast('✅ Comentario agregado');
    }

    // === RENDER ===
    function renderNotes() {
      const filter = els.searchInput.value.toLowerCase();
      const visible = state.notes.filter(note => {
        if (note.private && note.authorId !== state.currentUser?.uid) return false;
        if (filter) {
          return note.title?.toLowerCase().includes(filter) ||
                 note.content?.toLowerCase().includes(filter) ||
                 note.tags?.some(t => t?.toLowerCase().includes(filter));
        }
        return true;
      });

      if (visible.length === 0) {
        els.board.innerHTML = '';
        els.board.appendChild(els.emptyState);
        els.emptyState.style.display = 'block';
        return;
      }
      
      els.emptyState.style.display = 'none';
      els.board.className = 'board-grid';
      els.board.innerHTML = visible.map(note => createNoteHTML(note)).join('');
    }

    function createNoteHTML(note) {
      const isOwner = note.authorId === state.currentUser?.uid;
      const date = note.createdAt?.toDate?.() || new Date();
      const dateStr = date.toLocaleDateString('es-ES', { day:'numeric', month:'short', hour:'2-digit', minute:'2-digit' });
      
      let media = '';
      if (note.type === 'image' && note.url) {
        media = `<img src="${escapeHtml(note.url)}" loading="lazy" onerror="this.parentElement.innerHTML='<p style=\\'color:var(--danger)\\'>❌ No cargó</p>'">`;
      } else if (note.type === 'video' && note.url) {
        if (note.url.includes('youtube.com') || note.url.includes('youtu.be')) {
          const vid = note.url.match(/(?:v=|\/)([a-zA-Z0-9_-]{11})/)?.[1];
          if (vid) media = `<iframe src="https://www.youtube.com/embed/${vid}" frameborder="0" allowfullscreen></iframe>`;
        } else if (note.url.match(/\.(mp4|webm|ogg)$/i)) {
          media = `<video controls src="${escapeHtml(note.url)}"></video>`;
        } else {
          media = `<a href="${escapeHtml(note.url)}" target="_blank" class="link-card">🎬 Ver video</a>`;
        }
      } else if (note.type === 'link' && note.url) {
        media = `<a href="${escapeHtml(note.url)}" target="_blank" class="link-card">🔗 ${escapeHtml(note.url.replace(/^https?:\/\//,''))}</a>`;
      }
      
      const tags = note.tags?.map(t => `<span class="tag" onclick="filterByTag('${escapeHtml(t)}')">#${escapeHtml(t)}</span>`).join('') || '';
      
      // Verificar si el usuario actual dio like
      const hasLiked = note.likedBy?.includes(state.currentUser?.uid);
      
      const actions = isOwner ? 
        `<button title="Editar" onclick="window.editNote('${note.id}')">✏️</button>
         <button title="Eliminar" onclick="window.deleteNote('${note.id}')">🗑️</button>` : '';
      
      return `
        <article class="note" style="background:${note.color||'#fff'}" data-id="${note.id}">
          <div class="note-header">
            <div style="display:flex;align-items:center;gap:0.3rem">
              <div class="avatar">${(note.author?.[0]||'U').toUpperCase()}</div>
              <span style="font-size:0.75rem;font-weight:500">${escapeHtml(note.author||'Anónimo')}</span>
              <span style="font-size:0.65rem;color:var(--text-muted)">• ${dateStr}</span>
            </div>
            <div class="note-actions">${actions}</div>
          </div>
          <h4 class="note-title">${escapeHtml(note.title)}</h4>
          ${note.content ? `<div class="note-content">${escapeHtml(note.content)}</div>`:''}
          ${media}
          ${tags ? `<div class="note-tags">${tags}</div>`:''}
          <div class="note-reactions">
            <button class="reaction-btn ${hasLiked ? 'active' : ''}" onclick="window.toggleLike('${note.id}')">
              👍 <span>${note.reactions?.likes || 0}</span>
            </button>
            <button class="reaction-btn" onclick="window.openComments('${note.id}')">
              💬 <span>${note.reactions?.comments || 0}</span>
            </button>
          </div>
        </article>
      `;
    }

    // === MODAL NOTA ===
    function openNoteModal(noteId = null) {
      state.editingNoteId = noteId;
      
      if (noteId) {
        const note = state.notes.find(n => n.id === noteId);
        if (!note) return;
        document.getElementById('modalTitle').textContent = '✏️ Editar Nota';
        document.getElementById('noteTitle').value = note.title || '';
        document.getElementById('noteBody').value = note.content || '';
        document.getElementById('noteUrl').value = note.url || '';
        document.getElementById('noteTags').value = note.tags?.join(', ') || '';
        document.getElementById('notePrivate').checked = note.private || false;
        document.querySelectorAll('.post-type-btn').forEach(btn => 
          btn.classList.toggle('active', btn.dataset.type === note.type)
        );
        updateUrlField(note.type);
        document.querySelectorAll('.color-option').forEach(opt => 
          opt.classList.toggle('selected', opt.dataset.color === note.color)
        );
        state.selectedColor = note.color || '#ffffff';
      } else {
        document.getElementById('modalTitle').textContent = '✨ Nueva Nota';
        document.getElementById('noteTitle').value = '';
        document.getElementById('noteBody').value = '';
        document.getElementById('noteUrl').value = '';
        document.getElementById('noteTags').value = '';
        document.getElementById('notePrivate').checked = false;
        document.querySelectorAll('.post-type-btn').forEach((btn,i) => btn.classList.toggle('active', i===0));
        updateUrlField('text');
        document.querySelectorAll('.color-option').forEach((opt,i) => opt.classList.toggle('selected', i===0));
        state.selectedColor = '#ffffff';
      }
      
      els.noteModal.classList.add('active');
      document.body.style.overflow = 'hidden';
      document.getElementById('noteTitle').focus();
    }

    function closeModal() {
      els.noteModal.classList.remove('active');
      document.body.style.overflow = '';
      state.editingNoteId = null;
    }

    function updateUrlField(type) {
      const field = document.getElementById('fieldUrl');
      const label = document.getElementById('urlLabel');
      const hint = document.getElementById('urlHint');
      const content = document.getElementById('fieldContent');
      
      if (type === 'text') {
        field.style.display = 'none';
        content.style.display = 'block';
      } else {
        field.style.display = 'block';
        content.style.display = type === 'link' ? 'none' : 'block';
        if (type === 'image') { label.textContent = 'URL de imagen'; hint.textContent = 'JPG, PNG, GIF'; }
        else if (type === 'video') { label.textContent = 'URL de video'; hint.textContent = 'YouTube o MP4'; }
        else if (type === 'link') { label.textContent = 'URL del enlace'; hint.textContent = 'https://...'; }
      }
    }

    async function handleSaveNote() {
      const title = document.getElementById('noteTitle').value.trim();
      if (!title) { showToast('⚠️ Título obligatorio'); return; }
      
      const type = document.querySelector('.post-type-btn.active').dataset.type;
      const url = document.getElementById('noteUrl').value.trim();
      
      // CORRECCIÓN: Obtener el contenido correctamente
      const content = document.getElementById('noteBody').value; // Sin trim para permitir espacios
      
      if (['image','video','link'].includes(type) && url) {
        try { new URL(url); } catch { showToast('⚠️ URL inválida'); return; }
      }
      
      const tags = document.getElementById('noteTags').value.split(',').map(t=>t.trim().toLowerCase()).filter(Boolean);
      
      await saveNoteToFirestore({
        type, 
        title,
        content: type==='text'||type==='video' ? content : '', // Guardar contenido
        url: ['image','video','link'].includes(type) ? url : null,
        color: state.selectedColor, 
        tags,
        private: document.getElementById('notePrivate').checked
      });
      
      closeModal();
    }

    // === UTILIDADES ===
    function escapeHtml(text) {
      if (!text) return '';
      const div = document.createElement('div');
      div.textContent = text;
      return div.innerHTML;
    }

    function showToast(msg, dur=3000) {
      const t = document.createElement('div');
      t.className = 'toast'; t.textContent = msg;
      els.toastContainer.appendChild(t);
      setTimeout(() => { t.style.opacity='0'; setTimeout(()=>t.remove(),300); }, dur);
    }

    function filterByTag(tag) {
      els.searchInput.value = tag;
      els.searchInput.dispatchEvent(new Event('input'));
    }

    // === EVENT LISTENERS ===
    document.getElementById('btnNewNote').onclick = () => openNoteModal();
    document.getElementById('btnNewNoteEmpty').onclick = () => openNoteModal();
    document.getElementById('closeModal').onclick = closeModal;
    document.getElementById('cancelNote').onclick = closeModal;
    document.getElementById('saveNote').onclick = handleSaveNote;
    
    document.querySelectorAll('.post-type-btn').forEach(btn => 
      btn.onclick = () => {
        document.querySelectorAll('.post-type-btn').forEach(b=>b.classList.remove('active'));
        btn.classList.add('active');
        updateUrlField(btn.dataset.type);
      }
    );
    
    document.querySelectorAll('.color-option').forEach(opt => 
      opt.onclick = () => {
        document.querySelectorAll('.color-option').forEach(o=>o.classList.remove('selected'));
        opt.classList.add('selected');
        state.selectedColor = opt.dataset.color;
      }
    );
    
    // Selector de color de fondo
    document.querySelectorAll('.bg-color-option').forEach(opt => 
      opt.onclick = () => {
        document.querySelectorAll('.bg-color-option').forEach(o=>o.classList.remove('active'));
        opt.classList.add('active');
        state.boardBgColor = opt.dataset.color;
        els.board.style.backgroundColor = opt.dataset.color;
      }
    );
    
    els.searchInput.oninput = () => renderNotes();
    
    document.getElementById('btnExport').onclick = () => {
      const data = JSON.stringify(state.notes, null, 2);
      navigator.clipboard?.writeText(data).then(()=>showToast('📋 Copiado'))
        .catch(()=>{
          const blob = new Blob([data],{type:'application/json'});
          const a = document.createElement('a'); a.href=URL.createObjectURL(blob);
          a.download = `muro-${new Date().toISOString().slice(0,10)}.json`; a.click();
          showToast('📥 Descargado');
        });
    };
    
    // Modal comentarios
    document.getElementById('closeCommentsModal').onclick = closeCommentsModal;
    document.getElementById('addCommentBtn').onclick = addComment;
    document.getElementById('commentInput').onkeypress = (e) => {
      if (e.key === 'Enter') addComment();
    };
    
    els.noteModal.onclick = (e) => { if(e.target===els.noteModal) closeModal(); };
    els.commentsModal.onclick = (e) => { if(e.target===els.commentsModal) closeCommentsModal(); };
    document.onkeydown = (e) => { 
      if(e.key==='Escape') {
        if (els.noteModal.classList.contains('active')) closeModal();
        if (els.commentsModal.classList.contains('active')) closeCommentsModal();
      }
    };

    // Funciones globales
    window.editNote = (id) => openNoteModal(id);
    window.deleteNote = async (id) => { if(confirm('¿Eliminar?')) await deleteNoteFromFirestore(id); };
    window.toggleLike = toggleLike;
    window.openComments = openCommentsModal;
    window.filterByTag = filterByTag;
    window.closeModal = closeModal;

    document.querySelectorAll('.post-type-btn')[0]?.click();
  </script>
</body>
</html>
