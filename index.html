<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Muro Escolar Pro - Marcelo Tonini</title>
    
    <script src="https://www.gstatic.com/firebasejs/9.1.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.1.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.1.1/firebase-firestore-compat.js"></script>

    <style>
        :root {
            --primary: #6c5ce7;
            --success: #00b894;
            --danger: #d63031;
        }

        body { 
            margin: 0; font-family: 'Segoe UI', sans-serif; 
            background-color: #81ecec; 
            background-image: url('https://www.transparenttextures.com/patterns/notebook-dark.png'); 
            min-height: 100vh; transition: background 0.5s;
        }

        /* --- PANTALLA DE INICIO (RECUPERADA) --- */
        #login-screen { 
            position: fixed; top:0; left:0; width:100%; height:100%; 
            background: linear-gradient(rgba(108, 92, 231, 0.8), rgba(9, 132, 227, 0.8)), 
                        url('https://images.unsplash.com/photo-1517245386807-bb43f82c33c4?ixlib=rb-1.2.1&auto=format&fit=crop&w=1350&q=80');
            background-size: cover; background-position: center;
            display:none; flex-direction:column; justify-content:center; align-items:center; z-index:4000; 
            text-align: center; color: white; padding: 20px; box-sizing: border-box;
        }

        .login-card { 
            background: white; padding: 30px; border-radius: 24px; 
            box-shadow: 0 20px 50px rgba(0,0,0,0.4); width: 90%; max-width: 320px; color: #2d3436;
        }

        /* --- INTERFAZ PRINCIPAL --- */
        #header { 
            background: rgba(255, 255, 255, 0.96); padding: 10px 15px; 
            display: none; justify-content: space-between; align-items:center; 
            box-shadow: 0 4px 15px rgba(0,0,0,0.1); position: sticky; top: 0; z-index: 1000; 
        }

        .bg-controls { display: flex; gap: 8px; align-items: center; }
        .bg-dot { width: 22px; height: 22px; border-radius: 50%; border: 2px solid white; cursor: pointer; }

        #canvas { padding: 25px; display: flex; flex-wrap: wrap; gap: 20px; justify-content: center; }

        .note { 
            padding: 35px 15px 20px; border-radius: 2px; box-shadow: 5px 5px 15px rgba(0,0,0,0.15);
            position: relative; width: 280px; min-height: 200px; box-sizing: border-box;
        }
        
        .note::before { 
            content: ""; position: absolute; top: -8px; left: 50%; transform: translateX(-50%);
            width: 16px; height: 16px; background: #ff7675; border-radius: 50%; 
        }

        .note img { width: 100%; border-radius: 4px; margin-bottom: 10px; max-height: 180px; object-fit: cover; }
        .note h3 { margin: 0; font-size: 0.7em; color: rgba(0,0,0,0.4); text-transform: uppercase; border-bottom: 1px solid rgba(0,0,0,0.05); }
        .note p { margin: 10px 0 0; font-size: 1.1em; color: #2d3436; line-height: 1.4; }

        .actions { position: absolute; top: 8px; right: 8px; display: flex; gap: 5px; }
        .action-btn { background: rgba(255,255,255,0.8); border: none; padding: 4px; border-radius: 4px; cursor: pointer; font-size: 0.9em; }

        /* --- MODALES --- */
        #note-modal {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.7); display: none; justify-content: center; align-items: center; z-index: 5000;
        }
        .modal-content { background: white; padding: 25px; border-radius: 15px; width: 90%; max-width: 400px; }
        
        .color-selector { display: flex; gap: 8px; margin: 15px 0; justify-content: center; }
        .color-opt { width: 30px; height: 30px; border-radius: 50%; cursor: pointer; border: 2px solid #eee; }
        .color-opt.selected { border-color: #333; transform: scale(1.1); }

        .btn-add { background: var(--success); color: white; border: none; padding: 10px 20px; border-radius: 50px; cursor: pointer; font-weight: bold; }
    </style>
</head>
<body id="main-body">

<div id="login-screen">
    <div style="margin-bottom: 20px;">
        <h1 style="font-size: 3em; margin: 0;">Wall Escolar</h1>
        <p>Tu espacio personal de ideas.</p>
    </div>
    <div class="login-card">
        <h3>¡Bienvenido!</h3>
        <button onclick="login()" style="width:100%; padding: 12px; border-radius: 10px; border: 1px solid #ddd; cursor: pointer; font-weight: bold;">
            <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" width="14" style="vertical-align: middle; margin-right: 8px;">
            Entrar con Google
        </button>
    </div>
    <p style="margin-top:20px; font-size:0.8em;">Copyright 2026 - Marcelo Tonini</p>
</div>

<div id="header">
    <div class="bg-controls">
        <div class="bg-dot" style="background:#81ecec" onclick="changeBg('#81ecec')"></div>
        <div class="bg-dot" style="background:#fab1a0" onclick="changeBg('#fab1a0')"></div>
        <div class="bg-dot" style="background:#dfe6e9" onclick="changeBg('#dfe6e9')"></div>
        <div class="bg-dot" style="background:#fdcb6e" onclick="changeBg('#fdcb6e')"></div>
        <div class="bg-dot" style="background:#55efc4" onclick="changeBg('#55efc4')"></div>
    </div>
    <div style="display:flex; gap:15px; align-items: center;">
        <button onclick="logout()" style="background:none; border:none; color:var(--danger); cursor:pointer; font-weight:bold; font-size:0.8em">SALIR</button>
        <button class="btn-add" onclick="openModal()">+ NUEVA NOTA</button>
    </div>
</div>

<div id="canvas"></div>

<div id="note-modal">
    <div class="modal-content">
        <h3 id="modal-title">Nueva Nota</h3>
        <textarea id="note-text" placeholder="Escribe algo..." style="width:100%; height:100px; margin-bottom:10px; padding:10px; box-sizing:border-box; border-radius:8px; border:1px solid #ddd; resize:none;"></textarea>
        <input type="text" id="note-img" placeholder="Link de imagen (opcional)" style="width:100%; padding:10px; box-sizing:border-box; border-radius:8px; border:1px solid #ddd; margin-bottom:10px;">
        
        <p style="margin:5px 0; font-size:0.9em">Color:</p>
        <div class="color-selector" id="note-color-picker">
            <div class="color-opt selected" style="background:#fff740" onclick="selectColor('#fff740', this)"></div>
            <div class="color-opt" style="background:#7efff5" onclick="selectColor('#7efff5', this)"></div>
            <div class="color-opt" style="background:#ffaf40" onclick="selectColor('#ffaf40', this)"></div>
            <div class="color-opt" style="background:#ffcccc" onclick="selectColor('#ffcccc', this)"></div>
            <div class="color-opt" style="background:#cd84f1" onclick="selectColor('#cd84f1', this)"></div>
        </div>
        
        <div style="display:flex; justify-content: flex-end; gap:10px; margin-top:15px;">
            <button onclick="closeModal()" style="border:none; background:none; cursor:pointer;">Cancelar</button>
            <button id="save-btn" onclick="saveNote()" style="background:var(--success); color:white; border:none; padding:10px 25px; border-radius:8px; cursor:pointer; font-weight:bold;">Publicar</button>
        </div>
    </div>
</div>

<script>
  const firebaseConfig = {
    apiKey: "AIzaSyCpGmt5Va1MQVtKZtd9_p1_TA-62L1rUOc",
    authDomain: "wall-5b79c.firebaseapp.com",
    projectId: "wall-5b79c",
    storageBucket: "wall-5b79c.firebasestorage.app",
    messagingSenderId: "167646035095",
    appId: "1:167646035095:web:8286c655f6b0986b33fdd2"
  };

  firebase.initializeApp(firebaseConfig);
  const auth = firebase.auth();
  const db = firebase.firestore();

  let selectedNoteColor = '#fff740';
  let editingId = null;

  auth.onAuthStateChanged(user => {
    if (user) {
        document.getElementById('login-screen').style.display = 'none';
        document.getElementById('header').style.display = 'flex';
        listenNotes(user.uid);
    } else {
        document.getElementById('login-screen').style.display = 'flex';
        document.getElementById('header').style.display = 'none';
    }
  });

  function login() { auth.signInWithPopup(new firebase.auth.GoogleAuthProvider()); }
  function logout() { if(confirm("¿Cerrar sesión?")) auth.signOut(); }

  function openModal(id = null, text = '', img = '', color = '#fff740') {
    editingId = id;
    document.getElementById('modal-title').innerText = id ? "Editar Nota" : "Nueva Nota";
    document.getElementById('note-text').value = text;
    document.getElementById('note-img').value = img;
    selectedNoteColor = color;
    
    document.querySelectorAll('.color-opt').forEach(opt => {
        opt.classList.toggle('selected', opt.style.backgroundColor === hexToRgb(color));
    });

    document.getElementById('note-modal').style.display = 'flex';
  }

  function hexToRgb(hex) {
    const div = document.createElement("div");
    div.style.backgroundColor = hex;
    return div.style.backgroundColor;
  }

  function closeModal() { document.getElementById('note-modal').style.display = 'none'; }
  
  function selectColor(color, el) {
    selectedNoteColor = color;
    document.querySelectorAll('.color-opt').forEach(opt => opt.classList.remove('selected'));
    el.classList.add('selected');
  }

  function changeBg(color) { document.getElementById('main-body').style.backgroundColor = color; }

  function saveNote() {
    const text = document.getElementById('note-text').value;
    const img = document.getElementById('note-img').value;
    if (!text.trim()) return;

    const noteData = {
        content: text,
        imageUrl: img || null,
        color: selectedNoteColor,
        date: firebase.firestore.FieldValue.serverTimestamp()
    };

    if (editingId) {
        db.collection("notes").doc(editingId).update(noteData).then(closeModal);
    } else {
        db.collection("notes").add({
            ...noteData,
            author: auth.currentUser.displayName,
            authorId: auth.currentUser.uid,
            rotation: (Math.random() * 6 - 3).toFixed(1)
        }).then(closeModal);
    }
  }

  function deleteNote(id) { if(confirm("¿Borrar permanentemente?")) db.collection("notes").doc(id).delete(); }

  function listenNotes(uid) {
    db.collection("notes").onSnapshot(snapshot => {
        const canvas = document.getElementById('canvas');
        canvas.innerHTML = "";
        const docs = snapshot.docs.sort((a,b) => (b.data().date?.seconds || 0) - (a.data().date?.seconds || 0));

        docs.forEach(doc => {
            const data = doc.data();
            if (data.authorId === uid) {
                const noteDiv = document.createElement('div');
                noteDiv.className = 'note';
                noteDiv.style.backgroundColor = data.color;
                noteDiv.style.transform = `rotate(${data.rotation}deg)`;
                noteDiv.innerHTML = `
                    <div class="actions">
                        <button class="action-btn" onclick="openModal('${doc.id}', '${data.content.replace(/'/g, "\\'")}', '${data.imageUrl || ''}', '${data.color}')">✏️</button>
                        <button class="action-btn" onclick="deleteNote('${doc.id}')" style="color:var(--danger)">X</button>
                    </div>
                    ${data.imageUrl ? `<img src="${data.imageUrl}" onerror="this.style.display='none'">` : ''}
                    <h3>${data.author}</h3>
                    <p>${data.content}</p>
                `;
                canvas.appendChild(noteDiv);
            }
        });
    });
  }
</script>
</body>
</html>
