<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Muro Escolar - Marcelo Tonini</title>
    
    <script src="https://www.gstatic.com/firebasejs/9.1.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.1.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.1.1/firebase-firestore-compat.js"></script>

    <style>
        :root {
            --primary: #0984e3;
            --success: #00b894;
            --danger: #d63031;
            --dark: #2d3436;
            --bg-verde-agua: #81ecec; 
        }

        body { 
            margin: 0; 
            font-family: 'Segoe UI', sans-serif; 
            background: var(--bg-verde-agua) url('https://www.transparenttextures.com/patterns/notebook-dark.png'); 
            min-height: 100vh;
        }

        /* --- PORTADA ADAPTABLE (MOBILE FRIENDLY) --- */
        #login-screen { 
            position: fixed; top:0; left:0; width:100%; height:100%; 
            background: linear-gradient(rgba(108, 92, 231, 0.8), rgba(9, 132, 227, 0.8)), 
                        url('https://images.unsplash.com/photo-1517245386807-bb43f82c33c4?ixlib=rb-1.2.1&auto=format&fit=crop&w=1350&q=80');
            background-size: cover; background-position: center;
            display:none; flex-direction:column; justify-content:center; align-items:center; z-index:4000; 
            text-align: center; color: white; padding: 20px; box-sizing: border-box;
        }

        .login-card { 
            background: white; padding: 40px; border-radius: 24px; 
            box-shadow: 0 20px 50px rgba(0,0,0,0.4); width: 100%; max-width: 350px; color: var(--dark);
        }

        .btn-google { 
            background: white; color: var(--dark); border: 2px solid #dfe6e9; padding: 15px; 
            border-radius: 12px; cursor: pointer; font-weight: bold; width: 100%;
            display: flex; align-items: center; justify-content: center; gap: 10px;
        }

        .copyright { margin-top: 30px; font-size: 0.85em; opacity: 0.9; }

        /* --- INTERFAZ DEL MURO --- */
        #header { 
            background: rgba(255, 255, 255, 0.96); padding: 10px 20px; 
            display: none; justify-content: space-between; align-items:center; 
            box-shadow: 0 4px 15px rgba(0,0,0,0.1); position: sticky; top: 0; z-index: 1000; 
        }

        #canvas { 
            padding: 30px 15px; display: grid; 
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 25px; 
            justify-items: center;
        }

        /* --- NOTAS CON MÁS CUERPO VERTICAL --- */
        .note { 
            padding: 30px 20px 25px; border-radius: 2px; 
            box-shadow: 8px 8px 15px rgba(0,0,0,0.2); 
            position: relative; transition: 0.3s;
            width: 100%; max-width: 320px;
            /* Aquí le damos el largo vertical que pediste */
            min-height: 250px; 
            display: flex; flex-direction: column;
        }
        
        .note::before { 
            content: ""; position: absolute; top: -10px; left: 50%; transform: translateX(-50%);
            width: 18px; height: 18px; background: #e74c3c; border-radius: 50%; 
            box-shadow: 2px 2px 4px rgba(0,0,0,0.3); z-index: 5;
        }

        .note img { width: 100%; border-radius: 4px; margin-bottom: 15px; max-height: 200px; object-fit: cover; }
        .note h3 { margin: 0 0 10px 0; font-size: 0.8em; text-transform: uppercase; color: rgba(0,0,0,0.5); border-bottom: 1px solid rgba(0,0,0,0.1); }
        .note p { margin: 0; font-size: 1.1em; line-height: 1.4; color: #333; word-wrap: break-word; flex-grow: 1; }

        /* BOTONES DE ACCIÓN VISIBLES */
        .actions { position: absolute; top: 8px; right: 8px; display: flex; gap: 8px; z-index: 10; }
        .action-btn { 
            background: rgba(255,255,255,0.7); border: none; border-radius: 4px; 
            cursor: pointer; font-size: 1.1em; padding: 3px; display: flex; align-items: center; 
        }
        .action-btn:hover { background: white; transform: scale(1.1); }
        .btn-delete:hover { color: var(--danger); }

        .btn-add { background: var(--success); color: white; border: none; padding: 10px 18px; border-radius: 8px; cursor: pointer; font-weight: bold; }

        /* Ajustes para pantallas muy chicas */
        @media (max-width: 400px) {
            .welcome-title { font-size: 2.5em !important; }
            #header { padding: 10px; }
            #header h2 { font-size: 0.9em; }
        }
    </style>
</head>
<body>

<div id="loading-screen"><h3>Cargando...</h3></div>

<div id="login-screen">
    <div style="margin-bottom: 20px;">
        <h1 class="welcome-title" style="font-size: 3.5em; margin: 0;">Wall Escolar</h1>
        <p style="font-size: 1.3em;">Ideas en movimiento.</p>
    </div>
    <div class="login-card">
        <h3 style="margin-top:0">¡Buen día!</h3>
        <p>Iniciá sesión para participar en el muro.</p>
        <button class="btn-google" onclick="login()">
            <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" width="18">
            Entrar con Google
        </button>
    </div>
    <div class="copyright">Copyright 2026 - Desarrollado por Marcelo Tonini</div>
</div>

<div id="header">
    <h2 style="margin:0;">📌 Ideas en Acción</h2>
    <div style="display:flex; align-items:center; gap:15px">
        <div id="user-name" style="font-weight: bold; font-size:0.85em; display:none;"></div>
        <button onclick="logout()" style="background:none; border:none; color:var(--danger); cursor:pointer; font-size:0.8em; font-weight:bold">SALIR</button>
        <button class="btn-add" onclick="addNewNote()">+ NOTA</button>
    </div>
</div>

<div id="canvas"></div>

<script>
  const firebaseConfig = {
    apiKey: "AIzaSyCpGmt5Va1MQVtKZtd9_p1_TA-62L1rUOc",
    authDomain: "wall-5b79c.firebaseapp.com",
    projectId: "wall-5b79c",
    storageBucket: "wall-5b79c.firebasestorage.app",
    messagingSenderId: "167646035095",
    appId: "1:167646035095:web:8286c655f6b0986b33fdd2"
  };

  firebase.initializeApp(firebaseConfig);
  const auth = firebase.auth();
  const db = firebase.firestore();

  const colors = ['#fff740', '#7efff5', '#ffaf40', '#cd84f1', '#ffcccc', '#67e6dc'];

  auth.onAuthStateChanged(user => {
    document.getElementById('loading-screen').style.display = 'none';
    if (user) {
        document.getElementById('login-screen').style.display = 'none';
        document.getElementById('header').style.display = 'flex';
        document.getElementById('user-name').innerText = user.displayName;
        document.getElementById('user-name').style.display = 'block';
        listenNotes();
    } else {
        document.getElementById('login-screen').style.display = 'flex';
        document.getElementById('header').style.display = 'none';
    }
  });

  function login() { auth.signInWithPopup(new firebase.auth.GoogleAuthProvider()); }
  function logout() { if(confirm("¿Cerrar sesión?")) auth.signOut(); }

  function addNewNote() {
    const text = prompt("Escribí tu mensaje:");
    if (!text || text.trim() === "") return;
    
    db.collection("notes").add({
        content: text,
        imageUrl: null,
        author: auth.currentUser.displayName,
        authorId: auth.currentUser.uid,
        color: colors[Math.floor(Math.random() * colors.length)],
        rotation: (Math.random() * 6 - 3).toFixed(1),
        date: firebase.firestore.FieldValue.serverTimestamp()
    });
  }

  function editNote(id, currentText) {
    const newText = prompt("Edita tu mensaje:", currentText);
    if (newText && newText.trim() !== "" && newText !== currentText) {
        db.collection("notes").doc(id).update({ content: newText });
    }
  }

  function addImageToNote(id) {
    const url = prompt("Pegá el LINK de la imagen (.jpg, .png):");
    if (url && url.trim() !== "") {
        db.collection("notes").doc(id).update({ imageUrl: url.trim() });
    }
  }

  function deleteNote(id) { 
    if(confirm("¿Borrar esta nota?")) db.collection("notes").doc(id).delete();
  }

  function listenNotes() {
    db.collection("notes").orderBy("date", "desc").onSnapshot(snapshot => {
        const canvas = document.getElementById('canvas');
        canvas.innerHTML = "";
        snapshot.forEach(doc => {
            const data = doc.data();
            const isOwner = data.authorId === auth.currentUser.uid;
            const noteDiv = document.createElement('div');
            noteDiv.className = 'note';
            noteDiv.style.backgroundColor = data.color;
            noteDiv.style.transform = `rotate(${data.rotation}deg)`;
            
            noteDiv.innerHTML = `
                <div class="actions">
                    ${isOwner ? `<button class="action-btn" onclick="addImageToNote('${doc.id}')" title="Imagen">🖼️</button>` : ''}
                    ${isOwner ? `<button class="action-btn btn-edit" onclick="editNote('${doc.id}', '${data.content.replace(/'/g, "\\'")}')" title="Editar">✏️</button>` : ''}
                    ${isOwner ? `<button class="action-btn btn-delete" onclick="deleteNote('${doc.id}')" title="Borrar">X</button>` : ''}
                </div>
                ${data.imageUrl ? `<img src="${data.imageUrl}" onerror="this.style.display='none'">` : ''}
                <h3>${data.author}</h3>
                <p>${data.content}</p>
            `;
            canvas.appendChild(noteDiv);
        });
    });
  }
</script>
</body>
</html>
