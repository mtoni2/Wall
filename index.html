<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Muro Escolar - Marcelo Tonini</title>
    
    <script src="https://www.gstatic.com/firebasejs/9.1.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.1.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.1.1/firebase-firestore-compat.js"></script>

    <style>
        :root {
            --primary: #0984e3;
            --secondary: #6c5ce7;
            --success: #00b894;
            --danger: #d63031;
            --dark: #2d3436;
            --light: #f9f9f9;
        }

        body { 
            margin: 0; 
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; 
            background: #d2b48c url('https://www.transparenttextures.com/patterns/cork-board.png'); 
            min-height: 100vh;
            color: var(--dark);
        }

        /* --- PANTALLAS DE CARGA Y LOGIN --- */
        #loading-screen { 
            position: fixed; top:0; left:0; width:100%; height:100%; 
            background: white; display: flex; justify-content: center; 
            align-items: center; z-index: 9999; 
        }

        #login-screen { 
            position: fixed; top:0; left:0; width:100%; height:100%; 
            background: linear-gradient(rgba(108, 92, 231, 0.85), rgba(9, 132, 227, 0.85)), 
                        url('https://images.unsplash.com/photo-1517245386807-bb43f82c33c4?ixlib=rb-1.2.1&auto=format&fit=crop&w=1350&q=80');
            background-size: cover; background-position: center;
            display:none; flex-direction:column; justify-content:center; 
            align-items:center; z-index:8000; text-align: center; color: white;
        }

        .login-card { 
            background: white; padding: 60px 45px; border-radius: 28px; 
            box-shadow: 0 25px 60px rgba(0,0,0,0.4); width: 340px; color: var(--dark);
        }

        .login-card h1 { margin-top: 0; color: var(--primary); font-size: 2.2em; }

        .btn-google { 
            background: white; color: var(--dark); border: 2px solid #dfe6e9; 
            padding: 16px; border-radius: 14px; cursor: pointer; font-weight: bold; 
            font-size: 1.05em; display: flex; align-items: center; 
            justify-content: center; gap: 12px; width: 100%; transition: all 0.3s;
        }
        .btn-google:hover { background: #f8f9fa; border-color: var(--primary); transform: translateY(-3px); }

        .copyright { 
            position: absolute; bottom: 25px; font-size: 0.95em; 
            font-weight: 500; letter-spacing: 0.5px; text-shadow: 1px 1px 3px rgba(0,0,0,0.3);
        }

        /* --- INTERFAZ PRINCIPAL (HEADER) --- */
        #header { 
            background: rgba(255, 255, 255, 0.97); backdrop-filter: blur(12px);
            padding: 18px 45px; display: none; justify-content: space-between; 
            align-items:center; box-shadow: 0 5px 20px rgba(0,0,0,0.15); 
            position: sticky; top: 0; z-index: 2000; 
        }

        .btn-add { 
            background: var(--success); color: white; border: none; 
            padding: 14px 28px; border-radius: 12px; cursor: pointer; 
            font-weight: bold; font-size: 1em; box-shadow: 0 4px 10px rgba(0,0,0,0.1);
            transition: 0.2s;
        }
        .btn-add:hover { background: #00a082; transform: scale(1.05); }

        /* --- DISEÑO DEL MURO --- */
        #canvas { 
            padding: 45px; display: grid; 
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 35px; 
        }

        /* --- NOTAS (POST-ITS) --- */
        .note { 
            padding: 35px 25px 25px; border-radius: 4px; 
            box-shadow: 12px 12px 25px rgba(0,0,0,0.3); 
            position: relative; min-height: 200px; transition: 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            display: flex; flex-direction: column; overflow: hidden;
        }
        .note:hover { transform: scale(1.04) rotate(0deg) !important; z-index: 100; }

        /* Chinche/Pin */
        .note::before { 
            content: ""; position: absolute; top: -14px; left: 50%; transform: translateX(-50%);
            width: 22px; height: 22px; background: #e74c3c; border-radius: 50%; 
            box-shadow: 3px 3px 6px rgba(0,0,0,0.4); z-index: 5;
        }

        .note img { 
            width: 100%; border-radius: 6px; margin-bottom: 18px; 
            max-height: 380px; object-fit: cover; border: 1px solid rgba(0,0,0,0.05);
        }

        .note h3 { 
            margin: 0 0 12px 0; font-size: 0.85em; text-transform: uppercase; 
            color: rgba(0,0,0,0.45); border-bottom: 2px solid rgba(0,0,0,0.08); 
            padding-bottom: 6px; font-weight: 800;
        }

        .note p { 
            margin: 0; font-size: 1.2em; line-height: 1.6; color: #1e272e; 
            word-wrap: break-word; font-weight: 500;
        }

        /* BOTONES DE ACCIÓN */
        .actions { position: absolute; top: 12px; right: 12px; display: flex; gap: 12px; }
        .action-btn { 
            background: rgba(255,255,255,0.4); border-radius: 50%; width: 30px; height: 30px;
            border: none; cursor: pointer; font-size: 1.1em; color: rgba(0,0,0,0.4); 
            display: flex; align-items: center; justify-content: center; transition: 0.2s;
        }
        .action-btn:hover { background: white; color: var(--dark); transform: scale(1.1); }
        .btn-delete:hover { color: var(--danger); }

    </style>
</head>
<body>

<div id="loading-screen"><h3>Cargando sistema de Marcelo Tonini...</h3></div>

<div id="login-screen">
    <div style="margin-bottom: 45px;">
        <h1 style="font-size: 4.5em; margin: 0; text-shadow: 3px 5px 15px rgba(0,0,0,0.4);">Wall Escolar</h1>
        <p style="font-size: 1.8em; opacity: 0.95; font-weight: 300; letter-spacing: 1px;">Donde las ideas cobran vida</p>
    </div>
    <div class="login-card">
        <h1>¡Hola de nuevo!</h1>
        <p style="margin-bottom: 35px; color: #636e72;">Inicia sesión con tu cuenta de Google para participar en el muro.</p>
        <button class="btn-google" onclick="login()">
            <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" width="22">
            Continuar con Google
        </button>
    </div>
    <div class="copyright">Copyright 2026 - Desarrollado por Marcelo Tonini</div>
</div>

<div id="header">
    <div style="display:flex; align-items:center; gap:15px">
        <span style="font-size: 2em">📌</span>
        <h2 style="margin:0; font-size:1.4em; color:var(--dark); letter-spacing: -0.5px;">Muro: Ideas en Acción</h2>
    </div>
    <div style="display:flex; align-items:center; gap:30px">
        <div style="text-align:right">
            <div id="user-name" style="font-weight: 800; font-size:1em; color: var(--primary)"></div>
            <button onclick="logout()" style="background:none; border:none; color:var(--danger); cursor:pointer; font-size:0.85em; padding:0; font-weight: 700;">CERRAR SESIÓN</button>
        </div>
        <button class="btn-add" onclick="addNewNote()">+ NUEVA NOTA</button>
    </div>
</div>

<div id="canvas"></div>

<script>
  // Tu configuración de Firebase
  const firebaseConfig = {
    apiKey: "AIzaSyCpGmt5Va1MQVtKZtd9_p1_TA-62L1rUOc",
    authDomain: "wall-5b79c.firebaseapp.com",
    projectId: "wall-5b79c",
    storageBucket: "wall-5b79c.firebasestorage.app",
    messagingSenderId: "167646035095",
    appId: "1:167646035095:web:8286c655f6b0986b33fdd2"
  };

  firebase.initializeApp(firebaseConfig);
  const auth = firebase.auth();
  const db = firebase.firestore();

  const colors = ['#fff740', '#7efff5', '#ffaf40', '#cd84f1', '#ffcccc', '#67e6dc'];

  auth.onAuthStateChanged(user => {
    document.getElementById('loading-screen').style.display = 'none';
    if (user) {
        document.getElementById('login-screen').style.display = 'none';
        document.getElementById('header').style.display = 'flex';
        document.getElementById('user-name').innerText = user.displayName;
        listenNotes();
    } else {
        document.getElementById('login-screen').style.display = 'flex';
        document.getElementById('header').style.display = 'none';
        document.getElementById('canvas').innerHTML = "";
    }
  });

  function login() { auth.signInWithPopup(new firebase.auth.GoogleAuthProvider()); }
  
  function logout() { 
    if(confirm("¿Estás seguro de que deseas salir?")) auth.signOut(); 
  }

  function addNewNote() {
    const text = prompt("Paso 1: Escribe el mensaje de tu nota:");
    if (!text || text.trim() === "") return;
    
    // Guardamos inicialmente solo el texto
    db.collection("notes").add({
        content: text,
        imageUrl: null,
        author: auth.currentUser.displayName,
        authorId: auth.currentUser.uid,
        color: colors[Math.floor(Math.random() * colors.length)],
        rotation: (Math.random() * 8 - 4).toFixed(1),
        date: firebase.firestore.FieldValue.serverTimestamp()
    });
  }

  function addImageToNote(id) {
    const url = prompt("Paso 2: Pega el LINK DIRECTO de la imagen (debe terminar en .jpg, .png o .gif):");
    if (url && url.trim() !== "") {
        db.collection("notes").doc(id).update({
            imageUrl: url.trim()
        }).then(() => {
            console.log("Imagen actualizada correctamente");
        }).catch(err => {
            alert("Error al actualizar imagen: " + err.message);
        });
    }
  }

  function deleteNote(id) { 
    if(confirm("¿Eliminar esta nota para siempre?")) {
        db.collection("notes").doc(id).delete();
    }
  }

  function listenNotes() {
    db.collection("notes").orderBy("date", "desc").onSnapshot(snapshot => {
        const canvas = document.getElementById('canvas');
        canvas.innerHTML = "";
        snapshot.forEach(doc => {
            const data = doc.data();
            const isOwner = data.authorId === auth.currentUser.uid;
            const noteDiv = document.createElement('div');
            noteDiv.className = 'note';
            noteDiv.style.backgroundColor = data.color || '#fff9c4';
            noteDiv.style.transform = `rotate(${data.rotation || 0}deg)`;
            
            noteDiv.innerHTML = `
                <div class="actions">
                    ${isOwner ? `<button class="action-btn" onclick="addImageToNote('${doc.id}')" title="Añadir Imagen">🖼️</button>` : ''}
                    ${isOwner ? `<button class="action-btn btn-delete" onclick="deleteNote('${doc.id}')" title="Borrar">X</button>` : ''}
                </div>
                ${data.imageUrl ? `<img src="${data.imageUrl}" onerror="this.src='https://via.placeholder.com/400x300?text=Link+de+Imagen+Invalido'">` : ''}
                <h3>${data.author}</h3>
                <p>${data.content}</p>
            `;
            canvas.appendChild(noteDiv);
        });
    });
  }
</script>
</body>
</html>
